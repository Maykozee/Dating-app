<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EYORIKA</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#050505;
overflow:hidden;
height:100vh;
color:white;
}

/* ================= LOADING ================= */

.loading-screen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(180deg,#050505,#16110b,#050505);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:99999;
animation:hideLoading 2.8s forwards;
}

@keyframes hideLoading{
0%,85%{
opacity:1;
visibility:visible;
}
100%{
opacity:0;
visibility:hidden;
}
}

.loading-logo{
width:110px;
height:110px;
border-radius:28px;
display:flex;
justify-content:center;
align-items:center;
font-size:55px;
font-weight:900;
font-family:'Orbitron',sans-serif;
background:linear-gradient(135deg,#d4a574,#8b5e34,#f5d2a0);
color:#fff;
box-shadow:
0 0 20px rgba(212,165,116,0.5),
0 0 60px rgba(212,165,116,0.3);
position:relative;
overflow:hidden;
}

.loading-logo::before{
content:"";
position:absolute;
width:180%;
height:180%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent);
animation:shine 2s linear infinite;
}

@keyframes shine{
0%{
transform:translateX(-100%) rotate(25deg);
}
100%{
transform:translateX(100%) rotate(25deg);
}
}

.loading-logo span{
position:relative;
z-index:2;
}

.loading-title{
margin-top:25px;
font-size:42px;
font-family:'Orbitron',sans-serif;
font-weight:900;
letter-spacing:7px;
background:linear-gradient(90deg,#f7d4aa,#ffffff,#c58b52);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.loading-sub{
margin-top:10px;
font-size:14px;
letter-spacing:4px;
color:#d0b08b;
}

.loading-bar{
width:220px;
height:7px;
background:rgba(255,255,255,0.08);
border-radius:50px;
margin-top:35px;
overflow:hidden;
position:relative;
}

.loading-fill{
position:absolute;
left:-100%;
top:0;
width:100%;
height:100%;
background:linear-gradient(90deg,#d4a574,#fff,#8b5e34);
border-radius:50px;
animation:loadMove 1.8s linear infinite;
}

@keyframes loadMove{
100%{
left:100%;
}
}

.loading-name{
margin-top:24px;
font-size:12px;
letter-spacing:5px;
color:#9f7d5c;
}

/* ================= MAIN ================= */

.main{
position:relative;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:
radial-gradient(circle at top left,#3b220d 0%,transparent 35%),
radial-gradient(circle at bottom right,#7c5528 0%,transparent 35%),
#050505;
}

/* background icons */

.bg-icons{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
z-index:1;
}

.icon{
position:absolute;
font-size:34px;
opacity:0.07;
animation:float 16s linear infinite;
}

.icon:nth-child(1){
left:10%;
top:80%;
animation-delay:0s;
}

.icon:nth-child(2){
left:75%;
top:85%;
animation-delay:4s;
}

.icon:nth-child(3){
left:55%;
top:90%;
animation-delay:8s;
}

.icon:nth-child(4){
left:25%;
top:88%;
animation-delay:11s;
}

@keyframes float{
0%{
transform:translateY(0) rotate(0deg);
opacity:0;
}
10%{
opacity:0.08;
}
100%{
transform:translateY(-120vh) rotate(360deg);
opacity:0;
}
}

/* ================= TOP BUTTONS ================= */

.top-area{
position:absolute;
top:18px;
right:18px;
display:flex;
gap:10px;
z-index:50;
}

.top-btn{
padding:13px 18px;
border:none;
border-radius:18px;
background:rgba(255,255,255,0.07);
color:#f5d2a0;
font-weight:600;
font-size:14px;
cursor:pointer;
backdrop-filter:blur(16px);
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 0 15px rgba(0,0,0,0.3);
}

body.light .top-btn{
background:white;
color:#111;
}

/* ================= CARD ================= */

.card{
position:relative;
width:92%;
max-width:430px;
padding:45px 30px;
border-radius:38px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(25px);
text-align:center;
z-index:5;
overflow:hidden;
box-shadow:
0 0 40px rgba(0,0,0,0.45),
0 0 80px rgba(212,165,116,0.08);
}

.card::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(135deg,rgba(212,165,116,0.12),transparent,rgba(255,255,255,0.03));
pointer-events:none;
}

/* ================= LOGO ================= */

.logo-wrap{
position:relative;
z-index:2;
}

.logo-icon{
width:90px;
height:90px;
margin:auto;
border-radius:28px;
display:flex;
justify-content:center;
align-items:center;
font-size:44px;
font-weight:900;
font-family:'Orbitron',sans-serif;
background:linear-gradient(135deg,#d4a574,#8b5e34,#f5d2a0);
box-shadow:
0 0 20px rgba(212,165,116,0.45),
0 0 50px rgba(212,165,116,0.2);
margin-bottom:20px;
}

.logo-text{
font-size:52px;
font-family:'Orbitron',sans-serif;
font-weight:900;
letter-spacing:4px;
background:linear-gradient(90deg,#ffffff,#d4a574,#f5d2a0);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:18px;
}

.title{
font-size:38px;
font-weight:800;
line-height:1.3;
margin-bottom:18px;
}

.subtitle{
font-size:16px;
line-height:1.9;
color:#d8d8d8;
margin-bottom:35px;
}

/* ================= BUTTON ================= */

.btn{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:linear-gradient(90deg,#8b5e34,#d4a574,#f5d2a0);
font-size:18px;
font-weight:700;
cursor:pointer;
color:#111;
box-shadow:
0 0 25px rgba(212,165,116,0.35);
}

.btn:hover{
transform:translateY(-3px);
}

.mini{
margin-top:20px;
font-size:13px;
color:#b7b7b7;
line-height:1.7;
}

/* ================= LIGHT MODE ================= */

body.light{
background:#f3f3f3;
color:#111;
}

body.light .main{
background:
radial-gradient(circle at top left,#f7d8bb 0%,transparent 35%),
radial-gradient(circle at bottom right,#fff0de 0%,transparent 35%),
#f4f4f4;
}

body.light .card{
background:rgba(255,255,255,0.9);
}

body.light .subtitle,
body.light .mini{
color:#444;
}

body.light .logo-text{
background:linear-gradient(90deg,#8b5e34,#d4a574,#111);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

body.light .title{
color:#111;
}

/* ================= SIGNUP PAGE ================= */

.signup-page{
position:fixed;
top:0;
left:100%;
width:100%;
height:100%;
background:#070707;
z-index:5000;
overflow-y:auto;
padding:25px;
transition:0.7s;
}

.signup-page.active{
left:0;
}

.signup-card{
max-width:450px;
margin:auto;
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:30px;
border:1px solid rgba(255,255,255,0.08);
}

.signup-logo{
text-align:center;
font-size:38px;
font-family:'Orbitron',sans-serif;
font-weight:900;
margin-bottom:10px;
background:linear-gradient(90deg,#fff,#d4a574,#f5d2a0);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.signup-title{
text-align:center;
font-size:24px;
margin-bottom:25px;
}

.input{
width:100%;
padding:16px;
margin-bottom:16px;
border:none;
border-radius:16px;
background:rgba(255,255,255,0.08);
color:white;
font-size:15px;
outline:none;
}

.row{
display:flex;
gap:12px;
}

.social-btn{
width:100%;
padding:15px;
border:none;
border-radius:16px;
margin-top:12px;
background:rgba(255,255,255,0.08);
color:white;
font-weight:600;
cursor:pointer;
}

.switch{
margin-top:18px;
text-align:center;
font-size:14px;
color:#aaa;
}

</style>
</head>

<body>

<!-- LOADING -->

<div class="loading-screen">

<div class="loading-logo">
<span>E</span>
</div>

<div class="loading-title">
EYORIKA
</div>

<div class="loading-sub">
WELCOME TO EYORIKA
</div>

<div class="loading-bar">
<div class="loading-fill"></div>
</div>

<div class="loading-name">
MAYKOZEE
</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="bg-icons">
<div class="icon">🎵</div>
<div class="icon">📸</div>
<div class="icon">🎬</div>
<div class="icon">🔥</div>
</div>

<!-- TOP BUTTONS -->

<div class="top-area">

<button class="top-btn" id="langBtn" onclick="toggleLanguage()">
AM
</button>

<button class="top-btn" id="themeBtn" onclick="toggleTheme()">
LIGHT
</button>

</div>

<!-- CARD -->

<div class="card">

<div class="logo-wrap">

<div class="logo-icon">
E
</div>

<div class="logo-text">
EYORIKA
</div>

</div>

<div class="title" id="title">
Grow Faster.<br>
Go Viral.
</div>

<div class="subtitle" id="subtitle">
Smart creator tools for TikTok and Instagram growth.
</div>

<button class="btn" onclick="openSignup()" id="startBtn">
Get Started
</button>

<div class="mini" id="miniText">
Premium Creator Growth Platform
</div>

</div>

</div>

<!-- SIGNUP -->

<div class="signup-page" id="signupPage">

<div class="signup-card">

<div class="signup-logo">
EYORIKA
</div>

<div class="signup-title" id="signupTitle">
Create Your Account
</div>

<input class="input" type="text" placeholder="🎵 TikTok Username">

<input class="input" type="email" placeholder="📧 Email Address">

<div class="row">
<input class="input" type="text" placeholder="First Name">
<input class="input" type="text" placeholder="Last Name">
</div>

<input class="input" type="date">

<select class="input">
<option>🌍 Country</option>
<option>🇪🇹 Ethiopia</option>
<option>🇺🇸 United States</option>
<option>🇬🇧 United Kingdom</option>
<option>🇨🇦 Canada</option>
<option>🇩🇪 Germany</option>
<option>🇰🇪 Kenya</option>
<option>🇫🇷 France</option>
<option>🇦🇪 UAE</option>
</select>

<button class="btn">
Continue
</button>

<div class="switch">
Already have an account? Log In
</div>

<button class="social-btn">
Continue with Google
</button>

<button class="social-btn">
Continue with TikTok
</button>

<button class="social-btn">
Continue with Instagram
</button>

</div>

</div>

<script>

/* ================= SIGNUP ================= */

function openSignup(){
document.getElementById("signupPage").classList.add("active");
}

/* ================= LANGUAGE ================= */

let amharic = false;

function toggleLanguage(){

amharic = !amharic;

if(amharic){

document.getElementById("langBtn").innerHTML = "EN";

document.getElementById("title").innerHTML =
"በፍጥነት እደግ<br>ቫይራል ሁን";

document.getElementById("subtitle").innerHTML =
"ለTikTok እና Instagram ክሬይተሮች ዘመናዊ የእድገት መሳሪያዎች።";

document.getElementById("startBtn").innerHTML =
"ጀምር";

document.getElementById("miniText").innerHTML =
"ፕሪሚየም የክሬይተር እድገት ፕላትፎርም";

document.getElementById("signupTitle").innerHTML =
"አካውንት ይፍጠሩ";

}else{

document.getElementById("langBtn").innerHTML = "AM";

document.getElementById("title").innerHTML =
"Grow Faster.<br>Go Viral.";

document.getElementById("subtitle").innerHTML =
"Smart creator tools for TikTok and Instagram growth.";

document.getElementById("startBtn").innerHTML =
"Get Started";

document.getElementById("miniText").innerHTML =
"Premium Creator Growth Platform";

document.getElementById("signupTitle").innerHTML =
"Create Your Account";

}

}

/* ================= THEME ================= */

let lightMode = false;

function toggleTheme(){

lightMode = !lightMode;

if(lightMode){

document.body.classList.add("light");

document.getElementById("themeBtn").innerHTML = "DARK";

}else{

document.body.classList.remove("light");

document.getElementById("themeBtn").innerHTML = "LIGHT";

}

}

</script>

</body>
</html>
