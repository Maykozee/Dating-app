<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EYORIKA</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Outfit',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{

background:
linear-gradient(
180deg,
#050505 0%,
#0c0805 45%,
#1b120d 100%
);

color:white;
overflow:hidden;

}

/* ================= BACKGROUND ================= */

.main-bg{

position:fixed;
inset:0;

background:
radial-gradient(circle at top left,#6d3d18 0%,transparent 30%),
radial-gradient(circle at bottom right,#2c160b 0%,transparent 30%),
linear-gradient(180deg,#050505,#120904,#1d120c);

z-index:-5;

}

.noise{

position:fixed;
inset:0;

background:url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1200&auto=format&fit=crop');

background-size:cover;
background-position:center;

opacity:.04;

filter:blur(2px);

z-index:-4;

}

/* ================= PAGE ================= */

.page{

width:100%;
height:100vh;

position:absolute;
top:0;
left:0;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

padding:24px;

overflow:hidden;

}

.hidden{
display:none !important;
}

/* ================= ICON ================= */

.app-icon{

width:125px;
height:125px;

border-radius:38px;

position:relative;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(
145deg,
#fff4dc,
#d49b59,
#2a170b
);

border:1px solid rgba(255,255,255,.15);

box-shadow:
0 0 40px rgba(255,190,120,.20),
0 25px 70px rgba(0,0,0,.75);

overflow:hidden;

animation:floatIcon 4s ease-in-out infinite;

}

.app-icon::before{

content:"";

position:absolute;
inset:0;

background:
linear-gradient(
135deg,
transparent,
rgba(255,255,255,.15),
transparent
);

}

.app-icon::after{

content:"";

position:absolute;

width:170%;
height:42px;

background:rgba(255,255,255,.18);

transform:
rotate(-35deg)
translateY(-160px);

animation:iconShine 4s linear infinite;

}

.e-icon{

position:relative;
z-index:2;

width:78px;

display:flex;
flex-direction:column;
gap:10px;

}

.e-bar{

height:12px;

border-radius:40px;

background:
linear-gradient(
90deg,
#ffffff,
#ffe2b2,
#8f5b2e
);

box-shadow:
0 0 14px rgba(255,220,170,.55);

}

.e-top,
.e-bottom{
width:76px;
}

.e-middle{
width:52px;
}

/* ================= LOADING ================= */

#loadingPage{

background:transparent;

}

.light-beam{

position:absolute;

width:160px;
height:130vh;

background:
linear-gradient(
180deg,
transparent,
rgba(255,210,120,.10),
transparent
);

filter:blur(10px);

transform:rotate(28deg);

left:-140px;

animation:beamMove 6s linear infinite;

}

.loading-title{

margin-top:34px;

font-size:58px;
font-weight:800;

font-family:'Syne',sans-serif;

letter-spacing:7px;

background:
linear-gradient(
90deg,
#fff7ea,
#f6cd90,
#8f5b2e
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

filter:
drop-shadow(0 0 18px rgba(255,210,140,.12));

}

.loading-sub{

margin-top:14px;

font-size:13px;

letter-spacing:5px;

color:#c9a885;

text-transform:uppercase;

}

.loader{

width:230px;
height:7px;

margin-top:38px;

border-radius:40px;

overflow:hidden;

background:rgba(255,255,255,.08);

}

.loader-fill{

width:0%;
height:100%;

border-radius:40px;

background:
linear-gradient(
90deg,
#8f5b2e,
#f7d49a,
#fff8ef
);

animation:loadBar 1.8s ease forwards;

}

.socials{

display:flex;
gap:20px;

margin-top:34px;

}

.socials img{

width:52px;
height:52px;

padding:12px;

border-radius:18px;

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

transition:.35s;

}

.socials img:hover{

transform:translateY(-4px);

}

/* ================= WELCOME PAGE ================= */

#welcomePage{

background:
radial-gradient(circle at top,
rgba(255,170,70,.12),
transparent 35%);

}

.hero-glow{

position:absolute;

top:-140px;
left:50%;

transform:translateX(-50%);

width:320px;
height:320px;

border-radius:50%;

background:
radial-gradient(
circle,
rgba(255,190,120,.18),
transparent 70%
);

filter:blur(40px);

}

/* ================= CARD ================= */

.welcome-card{

width:100%;
max-width:430px;

padding:56px 28px 42px;

border-radius:42px;

position:relative;
overflow:hidden;

background:
linear-gradient(
180deg,
rgba(20,12,8,.92),
rgba(8,8,8,.96)
);

border:1px solid rgba(255,210,140,.10);

backdrop-filter:blur(24px);

box-shadow:
0 25px 90px rgba(0,0,0,.82),
0 0 50px rgba(255,170,70,.10);

text-align:center;

animation:cardShow .7s ease;

}

.welcome-card::before{

content:"";

position:absolute;
inset:0;

background:
linear-gradient(
130deg,
transparent 20%,
rgba(255,255,255,.04) 50%,
transparent 80%
);

pointer-events:none;

}

/* ===== IMPORTANT FIX ===== */
/* OLD SMALL ICON REMOVED */
/* ONLY PREMIUM ICON REMAINS */

.hero-icon{

margin:auto auto 28px;

}

/* ================= TEXT ================= */

.brand{

font-size:56px;
font-weight:900;

font-family:'Syne',sans-serif;

letter-spacing:6px;

background:
linear-gradient(
90deg,
#fff7ea,
#f4c988,
#8f5b2e
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

filter:
drop-shadow(0 0 18px rgba(255,210,140,.12));

}

.title{

margin-top:24px;

font-size:40px;
font-weight:800;

line-height:1.2;

font-family:'Syne',sans-serif;

}

.subtitle{

margin-top:20px;

font-size:16px;

line-height:1.9;

color:#b7aa9c;

}

/* ================= BUTTON ================= */

.main-btn{

width:100%;

margin-top:36px;

padding:20px;

border:none;

border-radius:24px;

font-size:18px;
font-weight:800;

letter-spacing:.5px;

cursor:pointer;

color:#050505;

position:relative;
overflow:hidden;

background:
linear-gradient(
135deg,
#7a4821,
#f7d49a,
#fff7eb
);

box-shadow:
0 12px 40px rgba(255,190,120,.24);

transition:.35s;

}

.main-btn::before{

content:"";

position:absolute;

top:0;
left:-120%;

width:80%;
height:100%;

background:
linear-gradient(
90deg,
transparent,
rgba(255,255,255,.45),
transparent
);

transform:skewX(-25deg);

transition:.8s;

}

.main-btn:hover::before{
left:130%;
}

.main-btn:hover{

transform:translateY(-3px);

box-shadow:
0 16px 45px rgba(255,210,120,.34);

}

.small-text{

margin-top:22px;

font-size:13px;

line-height:1.7;

color:#8f8479;

}

/* ================= ANIMATIONS ================= */

@keyframes loadBar{

0%{
width:0%;
}

100%{
width:100%;
}

}

@keyframes beamMove{

100%{
transform:rotate(28deg) translateX(650px);
}

}

@keyframes floatIcon{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-10px);
}

100%{
transform:translateY(0px);
}

}

@keyframes iconShine{

100%{

transform:
rotate(-35deg)
translateY(240px);

}

}

@keyframes cardShow{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* ================= MOBILE ================= */

@media(max-width:480px){

.loading-title{
font-size:46px;
}

.brand{
font-size:48px;
letter-spacing:4px;
}

.title{
font-size:30px;
}

.subtitle{
font-size:15px;
line-height:1.7;
}

.welcome-card{

padding:40px 22px;

border-radius:34px;

}

.app-icon{

width:105px;
height:105px;

}

.main-btn{

padding:18px;
font-size:17px;

}

}

/* ================= FADE ================= */

.page{
animation:fadePage .5s ease;
}

@keyframes fadePage{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>
</head>

<body>

<div class="main-bg"></div>
<div class="noise"></div>

<!-- ================= LOADING ================= -->

<section id="loadingPage" class="page">

<div class="light-beam"></div>

<div class="app-icon">

<div class="e-icon">

<div class="e-bar e-top"></div>
<div class="e-bar e-middle"></div>
<div class="e-bar e-bottom"></div>

</div>

</div>

<div class="loading-title">
EYORIKA
</div>

<div class="loading-sub">
WELCOME TO EYORIKA
</div>

<div class="loader">
<div class="loader-fill"></div>
</div>

<div class="socials">

<img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">

<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">

</div>

</section>

<!-- ================= WELCOME ================= -->

<section id="welcomePage" class="page hidden">

<div class="hero-glow"></div>

<div class="welcome-card">

<!-- ONLY PREMIUM ICON -->

<div class="app-icon hero-icon">

<div class="e-icon">

<div class="e-bar e-top"></div>
<div class="e-bar e-middle"></div>
<div class="e-bar e-bottom"></div>

</div>

</div>

<div class="brand">
EYORIKA
</div>

<div class="title">
Grow Faster.<br>
Go Viral.
</div>

<div class="subtitle">
Smart tools for TikTok and Instagram creators with premium creator experience.
</div>

<button class="main-btn">
Get Started
</button>

<div class="small-text">
Premium creator platform for modern social growth.
</div>

</div>

</section>

<script>

setTimeout(()=>{

const loading =
document.getElementById("loadingPage");

loading.style.transition=".6s ease";
loading.style.opacity="0";

setTimeout(()=>{

loading.classList.add("hidden");

document
.getElementById("welcomePage")
.classList.remove("hidden");

},600);

},1800);

</script>

</body>
</html>
