<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EYORIKA</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
transition:0.35s;
}

body{
background:#060606;
overflow:hidden;
height:100vh;
color:white;
}

/* ================= LOADING ================= */

.loader{
position:fixed;
width:100%;
height:100vh;
background:
linear-gradient(
145deg,
#050505,
#111111,
#1a1208
);

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:99999;
animation:hideLoader 2.8s forwards;
}

@keyframes hideLoader{

0%,85%{
opacity:1;
visibility:visible;
}

100%{
opacity:0;
visibility:hidden;
}

}

.logo-icon{

width:120px;
height:120px;
border-radius:32px;

background:
linear-gradient(
145deg,
#f7d58a,
#9c6b2f,
#f7d58a
);

display:flex;
justify-content:center;
align-items:center;

font-size:72px;
font-weight:900;

color:#050505;

box-shadow:
0 0 40px rgba(247,213,138,0.5),
0 0 80px rgba(247,213,138,0.2);

animation:pulse 2s infinite;
}

@keyframes pulse{

50%{
transform:scale(1.08);
}

}

.loading-title{

margin-top:30px;
font-size:54px;
font-weight:900;
letter-spacing:7px;

background:
linear-gradient(
90deg,
#f7d58a,
#ffffff,
#f7d58a
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.loading-sub{

margin-top:10px;
font-size:17px;
color:#c9b07a;
letter-spacing:2px;
}

.maykozee{

position:absolute;
bottom:40px;
font-size:14px;
letter-spacing:6px;
color:#8a6a35;
}

/* ================= MAIN ================= */

.main{
position:relative;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:
linear-gradient(
145deg,
#050505,
#0c0c0c,
#1a1208
);
}

/* backgrounds */

.bg1{
position:absolute;
width:420px;
height:420px;
background:#d4a24d;
filter:blur(170px);
border-radius:50%;
top:-150px;
left:-150px;
opacity:0.18;
}

.bg2{
position:absolute;
width:420px;
height:420px;
background:#f7d58a;
filter:blur(170px);
border-radius:50%;
bottom:-160px;
right:-160px;
opacity:0.12;
}

/* floating icons */

.float{
position:absolute;
font-size:22px;
opacity:0.13;
animation:floatUp 13s linear infinite;
color:#f7d58a;
font-weight:bold;
}

@keyframes floatUp{

0%{
transform:translateY(120vh);
opacity:0;
}

10%{
opacity:0.15;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}

/* top buttons */

.top-area{
position:absolute;
top:22px;
right:20px;
display:flex;
gap:12px;
z-index:100;
}

.top-btn{

padding:14px 22px;
border:none;
border-radius:18px;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(15px);

color:#f7d58a;

font-size:15px;
font-weight:bold;

border:1px solid rgba(247,213,138,0.18);

cursor:pointer;
}

/* dropdown */

.dropdown{

position:absolute;
top:70px;
right:0;

width:170px;

background:#111111;

border-radius:20px;

padding:10px;

display:none;

border:1px solid rgba(247,213,138,0.2);
}

.drop-item{

padding:14px;
border-radius:12px;
cursor:pointer;
font-size:15px;
color:#f7d58a;
}

.drop-item:hover{
background:rgba(247,213,138,0.08);
}

/* card */

.card{

position:relative;

width:92%;
max-width:450px;

padding:70px 35px;

border-radius:40px;

background:
rgba(255,255,255,0.04);

border:
1px solid rgba(247,213,138,0.12);

backdrop-filter:blur(24px);

text-align:center;

box-shadow:
0 0 50px rgba(0,0,0,0.5);

z-index:5;
}

/* logo */

.logo-wrap{

display:flex;
justify-content:center;
margin-bottom:25px;
}

.logo-mini{

width:78px;
height:78px;

border-radius:24px;

background:
linear-gradient(
145deg,
#f7d58a,
#8d6327,
#f7d58a
);

display:flex;
justify-content:center;
align-items:center;

font-size:42px;
font-weight:900;

color:#050505;

box-shadow:
0 0 25px rgba(247,213,138,0.4);
}

.logo{

margin-top:18px;

font-size:64px;
font-weight:900;

letter-spacing:5px;

background:
linear-gradient(
90deg,
#f7d58a,
#ffffff,
#c08b37
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* text */

.title{

margin-top:25px;

font-size:44px;
font-weight:900;

line-height:1.2;
}

.subtitle{

margin-top:22px;

font-size:18px;
line-height:1.9;

color:#d8d8d8;
}

/* button */

.btn{

margin-top:42px;

width:100%;

padding:20px;

border:none;

border-radius:22px;

background:
linear-gradient(
90deg,
#f7d58a,
#b8863b
);

color:#050505;

font-size:20px;
font-weight:900;

cursor:pointer;

box-shadow:
0 0 35px rgba(247,213,138,0.35);
}

/* mini */

.mini{

margin-top:24px;

font-size:13px;
letter-spacing:2px;

color:#9e9e9e;
}

/* signup */

.signup-page{

position:fixed;
top:0;
left:0;

width:100%;
height:100vh;

background:
linear-gradient(
145deg,
#050505,
#111111,
#1a1208
);

display:none;

justify-content:center;
align-items:center;

z-index:9999;
}

.signup-card{

width:92%;
max-width:430px;

padding:45px 30px;

border-radius:35px;

background:
rgba(255,255,255,0.05);

border:
1px solid rgba(247,213,138,0.15);

backdrop-filter:blur(20px);
}

.signup-title{

font-size:38px;
font-weight:900;
margin-bottom:30px;

color:#f7d58a;
text-align:center;
}

.input{

width:100%;

padding:18px;

margin-bottom:18px;

border:none;

border-radius:18px;

background:#111111;

color:white;

font-size:16px;

outline:none;

border:1px solid rgba(247,213,138,0.12);
}

.signup-btn{

width:100%;

padding:18px;

border:none;

border-radius:18px;

background:
linear-gradient(
90deg,
#f7d58a,
#b8863b
);

font-size:18px;
font-weight:900;

color:#050505;

cursor:pointer;
}

/* light mode */

body.light{

background:#f6f1e7;
color:black;
}

body.light .main{

background:
linear-gradient(
145deg,
#f6f1e7,
#ffffff,
#f0dfc2
);

}

body.light .card{

background:rgba(255,255,255,0.8);

}

body.light .title{
color:black;
}

body.light .subtitle{
color:#444;
}

body.light .top-btn{

background:white;
color:black;
}

body.light .dropdown{
background:white;
}

body.light .drop-item{
color:black;
}

</style>
</head>

<body>

<!-- loading -->

<div class="loader">

<div class="logo-icon">
E
</div>

<div class="loading-title">
EYORIKA
</div>

<div class="loading-sub">
WELCOME TO THE FUTURE
</div>

<div class="maykozee">
MAYKOZEE
</div>

</div>

<!-- signup -->

<div class="signup-page" id="signupPage">

<div class="signup-card">

<div class="signup-title">
Create Account
</div>

<input class="input" placeholder="Username">

<input class="input" placeholder="Email">

<input class="input" placeholder="Password" type="password">

<button class="signup-btn">
Continue
</button>

</div>

</div>

<!-- main -->

<div class="main">

<div class="bg1"></div>
<div class="bg2"></div>

<!-- floating -->

<div class="float" style="left:12%">
TikTok
</div>

<div class="float" style="left:70%;animation-delay:2s">
Instagram
</div>

<div class="float" style="left:40%;animation-delay:4s">
Followers
</div>

<div class="float" style="left:85%;animation-delay:6s">
Views
</div>

<!-- top -->

<div class="top-area">

<button class="top-btn" onclick="toggleLang()" id="langBtn">
አማርኛ
</button>

<button class="top-btn" onclick="toggleDark()" id="darkBtn">
Dark
</button>

<div class="dropdown" id="langMenu">

<div class="drop-item" onclick="changeLang()">
Switch Language
</div>

</div>

</div>

<!-- card -->

<div class="card">

<div class="logo-wrap">

<div class="logo-mini">
E
</div>

</div>

<div class="logo" id="logoText">
EYORIKA
</div>

<div class="title" id="title">
Grow Faster. Go Viral.
</div>

<div class="subtitle" id="subtitle">
Smart premium tools for TikTok and Instagram creators.
</div>

<button class="btn" id="startBtn" onclick="goSignup()">
Get Started
</button>

<div class="mini" id="miniText">
PREMIUM CREATOR PLATFORM
</div>

</div>

</div>

<script>

/* language */

let amharic = false;

function changeLang(){

amharic = !amharic;

if(amharic){

document.getElementById("logoText").innerHTML =
"ኢዮሪካ";

document.getElementById("title").innerHTML =
"ፈጣን እድገት እና ቫይራል ስኬት";

document.getElementById("subtitle").innerHTML =
"ለTikTok እና Instagram ክሬይተሮች ዘመናዊ premium መሳሪያዎች።";

document.getElementById("startBtn").innerHTML =
"ጀምር";

document.getElementById("miniText").innerHTML =
"ዘመናዊ የክሬይተር መድረክ";

document.getElementById("langBtn").innerHTML =
"English";

}else{

document.getElementById("logoText").innerHTML =
"EYORIKA";

document.getElementById("title").innerHTML =
"Grow Faster. Go Viral.";

document.getElementById("subtitle").innerHTML =
"Smart premium tools for TikTok and Instagram creators.";

document.getElementById("startBtn").innerHTML =
"Get Started";

document.getElementById("miniText").innerHTML =
"PREMIUM CREATOR PLATFORM";

document.getElementById("langBtn").innerHTML =
"አማርኛ";

}

document.getElementById("langMenu").style.display =
"none";

}

/* language menu */

function toggleLang(){

let menu =
document.getElementById("langMenu");

if(menu.style.display === "block"){

menu.style.display = "none";

}else{

menu.style.display = "block";

}

}

/* dark mode */

let dark = true;

function toggleDark(){

dark = !dark;

if(dark){

document.body.classList.remove("light");

document.getElementById("darkBtn").innerHTML =
"Dark";

}else{

document.body.classList.add("light");

document.getElementById("darkBtn").innerHTML =
"Light";

}

}

/* signup */

function goSignup(){

document.getElementById("signupPage").style.display =
"flex";

}

</script>

</body>
</html>
