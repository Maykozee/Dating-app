<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EthioDating</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0f0f13;
color:white;
}

/* splash */
#splash{
position:fixed;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:black;
z-index:999;
}

/* pages */
.page{
display:none;
height:100vh;
}

.active{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* welcome full screen */
#welcome{
background:url('https://images.unsplash.com/photo-1524504388940-b1c1722653e1?q=80&w=1200') center/cover;
}

.overlay{
background:rgba(0,0,0,0.6);
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:flex-end;
padding:30px;
box-sizing:border-box;
}

button{
padding:15px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:16px;
}

.main{
background:#ff2f6d;
color:white;
}

.input{
width:90%;
padding:15px;
margin:10px;
border-radius:10px;
border:none;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
<h1>❤️ EthioDating</h1>
<p>Loading...</p>
</div>

<!-- WELCOME -->
<div id="welcome" class="page">
<div class="overlay">

<h1>Find Your Perfect Match</h1>

<button class="main" onclick="goLogin()">Continue</button>
<button onclick="goLogin()">Continue with Phone</button>
<button onclick="google()">Continue with Gmail</button>

</div>
</div>

<!-- LOGIN -->
<div id="login" class="page">
<h2>Login</h2>

<input id="phone" class="input" placeholder="Phone Number">

<button class="main" onclick="sendCode()">Send Code</button>

<div id="codeBox" style="display:none;">
<input id="code" class="input" placeholder="Enter Code">
<button class="main" onclick="verify()">Verify</button>
</div>

</div>

<!-- SIGNUP -->
<div id="signup" class="page">

<h2>Create Profile</h2>

<input id="name" class="input" placeholder="Name">
<input id="age" class="input" type="number" placeholder="Age">

<select id="gender" class="input">
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<select id="looking" class="input">
<option value="">Looking For</option>
<option>Male</option>
<option>Female</option>
</select>

<select class="input">
<option>City</option>
<option>Addis Ababa</option>
<option>Adama</option>
<option>Hawassa</option>
</select>

<!-- EXTRA QUESTIONS -->
<select class="input"><option>Do you drink?</option><option>No</option><option>Yes</option></select>
<select class="input"><option>Do you smoke?</option><option>No</option><option>Yes</option></select>
<select class="input"><option>Gym?</option><option>Yes</option><option>No</option></select>
<select class="input"><option>Travel?</option><option>Yes</option><option>No</option></select>
<select class="input"><option>Relationship Goal</option><option>Marriage</option><option>Dating</option></select>

<button class="main" onclick="finish()">Finish</button>

</div>

<!-- APP -->
<div id="app" class="page">
<h1>Welcome ❤️</h1>
<p>App is working</p>
</div>

<script>

/* splash */
setTimeout(()=>{
document.getElementById("splash").style.display="none"
show("welcome")
},2000)

/* page switch */
function show(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

/* welcome → login */
function goLogin(){
show("login")
}

/* gmail */
function google(){
alert("Google login soon")
}

/* send code */
function sendCode(){
let phone=document.getElementById("phone").value

if(phone==""){
alert("Enter phone")
return
}

document.getElementById("codeBox").style.display="block"
}

/* verify */
function verify(){
let code=document.getElementById("code").value

if(code==""){
alert("Enter code")
return
}

/* go signup */
show("signup")
}

/* finish signup */
function finish(){

let name=document.getElementById("name").value
let age=document.getElementById("age").value
let gender=document.getElementById("gender").value
let looking=document.getElementById("looking").value

if(name=="" || age=="" || gender=="" || looking==""){
alert("Fill all fields")
return
}

if(age<18){
alert("18+ only")
return
}

if(gender==looking){
alert("Choose opposite gender")
return
}

/* go app */
show("app")
}

</script>

</body>
</html>
