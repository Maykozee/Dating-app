<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Simple Dating App</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(to right,pink,purple);
  font-family:Arial;
}
  
  #login{
  background:white;
  padding:20px;
  border-radius:20px;
  text-align:center;
}

#app{
  display:none;
}
  
.card{
  background:rgba(255,255,255,0.2);

  backdrop-filter:blur(10px);

  padding:20px;
  border-radius:25px;

  text-align:center;
  width:260px;

  transition:transform 0.3s;

  box-shadow:0 8px 30px rgba(0,0,0,0.2);

  border:1px solid rgba(255,255,255,0.3);
}

img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:15px;
}

button{
  font-size:22px;
  margin:10px;
  padding:12px 16px;

  border:none;
  border-radius:15px;

  cursor:pointer;

  transition:0.2s;

  background:white;

  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

  button:active{
  transform:scale(0.9);
}

  input{
  padding:12px;
  border-radius:10px;
  border:none;

  width:80%;

  font-size:18px;

  outline:none;
}
.likeBtn{
  background:#ff4b91;
  color:white;
}

.dislikeBtn{
  background:#444;
  color:white;
}
  #count{
  font-weight:bold;
}
  
  .dark{
  background:black;
  color:white;
}
.dark .card{
  background:#222;
}
  
  #toast{
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: black;
  color: white;
  padding: 10px 20px;
  border-radius: 10px;
  opacity: 0;
  transition: opacity 0.3s;
}
  #match{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.5);

  background:linear-gradient(to right,#ff4b91,#ff0066);
  color:white;

  padding:30px 50px;
  border-radius:30px;

  font-size:35px;
  font-weight:bold;

  box-shadow:0 0 30px rgba(0,0,0,0.4);

  display:none;
  opacity:0;

  transition:0.3s;
  z-index:1000;
}
#chat{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  border-radius:20px;
  display:none;
  width:250px;
}
</style>
</head>

<body>
  <div id="login">
  <h2>Login</h2>

  <input id="username"
placeholder="Your name">

  <br><br>

  <button onclick="login()">Enter</button>
</div>

<div class="card" id="app">
  <img id="photo">
  <h2>
  <span id="name"></span> ✔️
</h2>
  <p id="bio"></p>

  <button class="dislikeBtn" onclick="dislike()">❌</button>
  <button class="likeBtn" onclick="like()">❤️</button>
  <button onclick="viewLikes()">📋 Likes</button>
  <button onclick="darkMode()">🌙 Dark</button>
  <button onclick="openChat()">💬 Chat</button>
  
  <p id="count">Likes: 0</p>
  
</div> 
<div id="toast"></div>
<div id="match">
  ❤️ MATCHED ❤️
</div>
  <div id="chat">
  <h3>💬 Chat</h3>
  <p>Hello 👋</p>
  <button onclick="closeChat()">Close</button>
</div>
<script>
let users = [
  {name:"Sara", bio:"Love music 🎵", img:"https://i.pravatar.cc/300?img=1"},
  {name:"Abel", bio:"Gym 💪", img:"https://i.pravatar.cc/300?img=8"},
  {name:"Liya", bio:"Travel ✈️", img:"https://i.pravatar.cc/300?img=5"},
  {name:"Dani", bio:"Football ⚽", img:"https://i.pravatar.cc/300?img=12"},
  {name:"Miki", bio:"Coding 💻", img:"https://i.pravatar.cc/300?img=15"}
];

  let i = 0;
  let liked = [];
  let startX = 0;
  let card = document.querySelector(".card");

card.addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
});

card.addEventListener("touchend", e=>{
  let endX = e.changedTouches[0].clientX;

  if(endX - startX > 50){
    like();
  }

  if(startX - endX > 50){
    dislike();
  }
});
  
  function showToast(msg){
  let t = document.getElementById("toast");
  t.innerText = msg;
  t.style.opacity = 1;

  setTimeout(()=>{
    t.style.opacity = 0;
  }, 500);
}

function show(){
  document.getElementById("name").innerText = users[i].name;
  document.getElementById("bio").innerText = users[i].bio;
  document.getElementById("photo").src = users[i].img;
}
function next(){
  i++;
  if(i >= users.length){
    i = 0;
  }
  
  show();
}
  
function like(){
  liked.push(users[i]);

  document.getElementById("count").innerText =
"Likes: " + liked.length;
  
  document.querySelector(".card").style.transform =
  "translateX(300px) rotate(20deg)";
  
  showToast("Liked " + users[i].name);
  showMatch();

  setTimeout(()=>{
    document.querySelector(".card").style.transform =
    "translateX(0)";

    next();
  },300);
}

function dislike(){
  document.querySelector(".card").style.transform =
  "translateX(-300px) rotate(-20deg)";

  showToast("Disliked " + users[i].name);

  setTimeout(()=>{
    document.querySelector(".card").style.transform =
    "translateX(0)";

    next();
  },300);
}
  function showMatch(){
  let m = document.getElementById("match");

  m.style.display = "block";

  setTimeout(()=>{
    m.style.opacity = "1";
    m.style.transform =
    "translate(-50%,-50%) scale(1)";
  },10);

  setTimeout(()=>{
    m.style.opacity = "0";
    m.style.transform =
    "translate(-50%,-50%) scale(0.5)";
  },800);

  setTimeout(()=>{
    m.style.display = "none";
  },1100);
}

  function login(){
  let name =
  document.getElementById("username").value;

  if(name != ""){
    document.getElementById("login").style.display =
    "none";

    document.getElementById("app").style.display =
    "block";
   }
  }
function openChat(){
  document.getElementById("chat").style.display = "block";
}

function closeChat(){
  document.getElementById("chat").style.display = "none";
}
  
function darkMode(){
  document.body.classList.toggle("dark");
}
function viewLikes(){
  let names = liked.map(x => x.name).join(", ");

  if(names == ""){
    alert("No likes yet");
  }else{
    alert("Liked people: " + names);
  }
}
show();
</script>

</body>
</html>
