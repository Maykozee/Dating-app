<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>EYORIKA</title>

<!-- PREMIUM FONTS -->

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* =========================
RESET
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html{
scroll-behavior:smooth;
}

body{

font-family:'Outfit',sans-serif;

background:#050505;
color:white;

overflow:hidden;

}

/* =========================
GLOBAL
========================= */

.hidden{
display:none !important;
}

.page{

position:absolute;
inset:0;

width:100%;
height:100vh;

overflow:hidden;

}

/* =========================
PREMIUM BACKGROUND
========================= */

.main-bg{

position:absolute;
inset:0;

background:

radial-gradient(
circle at top left,
rgba(190,110,50,.28),
transparent 35%
),

radial-gradient(
circle at bottom right,
rgba(90,40,15,.24),
transparent 35%
),

linear-gradient(
180deg,
#050505 0%,
#120904 50%,
#1c120d 100%
);

z-index:-5;

}

.noise{

position:absolute;
inset:0;

background:
url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1200&auto=format&fit=crop');

background-size:cover;
background-position:center;

opacity:.04;

filter:blur(2px);

z-index:-4;

}

/* =========================
LIGHT EFFECT
========================= */

.light-beam{

position:absolute;

left:-180px;
top:-20%;

width:240px;
height:140vh;

background:
linear-gradient(
180deg,
transparent,
rgba(255,210,120,.10),
transparent
);

filter:blur(12px);

transform:rotate(28deg);

animation:beamMove 7s linear infinite;

z-index:-1;

}

/* =========================
PREMIUM LOGO
========================= */

.app-icon{

width:124px;
height:124px;

border-radius:40px;

margin:auto;

position:relative;

display:flex;
align-items:center;
justify-content:center;

overflow:hidden;

background:
linear-gradient(
145deg,
#fff4dd,
#d89b57,
#2d1809
);

border:1px solid rgba(255,255,255,.12);

box-shadow:

0 0 40px rgba(255,190,120,.20),

0 24px 70px rgba(0,0,0,.75);

animation:floatIcon 5s ease-in-out infinite;

}

.app-icon::before{

content:"";

position:absolute;
inset:0;

background:
linear-gradient(
135deg,
transparent,
rgba(255,255,255,.14),
transparent
);

}

.app-icon::after{

content:"";

position:absolute;

width:180%;
height:45px;

background:
rgba(255,255,255,.18);

transform:
rotate(-35deg)
translateY(-180px);

animation:iconShine 4.5s linear infinite;

}

/* =========================
E ICON
========================= */

.e-icon{

width:80px;
height:80px;

display:flex;
flex-direction:column;
justify-content:center;

gap:11px;

position:relative;
z-index:2;

}

.e-bar{

height:12px;

border-radius:40px;

background:
linear-gradient(
90deg,
#ffffff,
#ffe0b0,
#8f5b2e
);

box-shadow:
0 0 14px rgba(255,220,170,.50);

}

.e-top,
.e-bottom{
width:78px;
}

.e-middle{
width:52px;
}

/* =========================
LOADING PAGE
========================= */

#loadingPage{

display:flex;
flex-direction:column;

justify-content:center;
align-items:center;

padding:24px;

}

.loading-title{

margin-top:34px;

font-size:62px;
font-weight:800;

letter-spacing:8px;

font-family:'Syne',sans-serif;

background:
linear-gradient(
90deg,
#fff8ef,
#f5cf97,
#8f5b2e
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 0 22px rgba(255,210,120,.12);

}

.loading-sub{

margin-top:14px;

font-size:13px;
font-weight:500;

letter-spacing:5px;

color:#d7b58b;

text-transform:uppercase;

}

.loader{

width:240px;
height:7px;

margin-top:42px;

background:
rgba(255,255,255,.08);

border-radius:40px;

overflow:hidden;

}

.loader-fill{

width:0%;
height:100%;

border-radius:40px;

background:
linear-gradient(
90deg,
#8f5b2e,
#f7d49a,
#fff7ec
);

box-shadow:
0 0 18px rgba(255,220,170,.35);

animation:loadBar 1.8s ease forwards;

}

.socials{

display:flex;
gap:22px;

margin-top:36px;

}

.socials img{

width:56px;
height:56px;

padding:12px;

border-radius:20px;

background:
rgba(255,255,255,.04);

border:
1px solid rgba(255,255,255,.08);

box-shadow:
0 0 20px rgba(255,190,120,.10);

transition:.35s;

}

.socials img:hover{

transform:translateY(-4px);

}

/* =========================
WELCOME PAGE
========================= */

#welcomePage{

display:flex;
justify-content:center;
align-items:center;

padding:28px;

text-align:center;

}

.welcome-content{

width:100%;
max-width:520px;

position:relative;
z-index:2;

animation:welcomeShow .8s ease;

}

.welcome-glow{

position:absolute;

top:-140px;
left:50%;

transform:translateX(-50%);

width:340px;
height:340px;

border-radius:50%;

background:
radial-gradient(
circle,
rgba(255,180,90,.18),
transparent 70%
);

filter:blur(40px);

z-index:-1;

}

.hero-icon{

margin-bottom:36px;

transform:scale(1.08);

}

.brand{

font-size:68px;
font-weight:800;

letter-spacing:8px;

font-family:'Syne',sans-serif;

background:
linear-gradient(
90deg,
#fff8ef,
#f5cf97,
#8f5b2e
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 0 20px rgba(255,210,120,.12);

}

.title{

margin-top:24px;

font-size:42px;
line-height:1.2;

font-weight:800;

font-family:'Syne',sans-serif;

}

.subtitle{

margin-top:22px;

font-size:16px;
line-height:1.9;

color:#b7ab9d;

}

/* =========================
BUTTON
========================= */

.main-btn{

width:100%;

margin-top:38px;

padding:21px;

border:none;
outline:none;

border-radius:26px;

cursor:pointer;

font-size:18px;
font-weight:800;

color:#050505;

background:
linear-gradient(
135deg,
#7a4821,
#f7d49a,
#fff8ef
);

box-shadow:
0 15px 40px rgba(255,190,120,.25);

transition:.35s;

}

.main-btn:hover{

transform:translateY(-3px);

box-shadow:
0 18px 45px rgba(255,210,120,.35);

}

/* =========================
BOTTOM TEXT
========================= */

.bottom-text{

margin-top:24px;

font-size:13px;

letter-spacing:1px;

color:#8e8378;

line-height:1.8;

}

/* =========================
ANIMATIONS
========================= */

@keyframes loadBar{

0%{
width:0%;
}

100%{
width:100%;
}

}

@keyframes beamMove{

100%{

transform:
rotate(28deg)
translateX(760px);

}

}

@keyframes floatIcon{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-10px);
}

100%{
transform:translateY(0px);
}

}

@keyframes iconShine{

100%{

transform:
rotate(-35deg)
translateY(300px);

}

}

@keyframes welcomeShow{

from{
opacity:0;
transform:translateY(24px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* =========================
MOBILE
========================= */

@media(max-width:480px){

.loading-title{
font-size:48px;
}

.brand{
font-size:52px;
letter-spacing:5px;
}

.title{
font-size:32px;
}

.subtitle{
font-size:15px;
line-height:1.8;
}

.main-btn{
padding:19px;
font-size:17px;
}

.app-icon{
width:108px;
height:108px;
}

}

</style>
</head>

<body>

<!-- =========================
GLOBAL BACKGROUND
========================= -->

<div class="main-bg"></div>
<div class="noise"></div>

<!-- =========================
LOADING PAGE
========================= -->

<section id="loadingPage" class="page">

<div class="light-beam"></div>

<div class="app-icon">

<div class="e-icon">

<div class="e-bar e-top"></div>
<div class="e-bar e-middle"></div>
<div class="e-bar e-bottom"></div>

</div>

</div>

<div class="loading-title">
EYORIKA
</div>

<div class="loading-sub">
WELCOME TO EYORIKA
</div>

<div class="loader">
<div class="loader-fill"></div>
</div>

<div class="socials">

<img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">

<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">

</div>

</section>

<!-- =========================
WELCOME PAGE
========================= -->

<section id="welcomePage" class="page hidden">

<div class="light-beam"></div>

<div class="welcome-glow"></div>

<div class="welcome-content">

<div class="app-icon hero-icon">

<div class="e-icon">

<div class="e-bar e-top"></div>
<div class="e-bar e-middle"></div>
<div class="e-bar e-bottom"></div>

</div>

</div>

<div class="brand">
EYORIKA
</div>

<div class="title">
Grow Faster.<br>
Go Viral.
</div>

<div class="subtitle">

Build your digital presence with cinematic creator tools,
luxury branding experiences,
and next generation social growth systems.

</div>

<button class="main-btn">
Get Started
</button>

<div class="bottom-text">

Premium creator experience designed for
modern social media growth.

</div>

</div>

</section>

<script>

/* =========================
SMOOTH LOADING TRANSITION
========================= */

setTimeout(()=>{

const loadingPage =
document.getElementById("loadingPage");

const welcomePage =
document.getElementById("welcomePage");

/* fade out */

loadingPage.style.transition =
".7s ease";

loadingPage.style.opacity = "0";

/* switch */

setTimeout(()=>{

loadingPage.classList.add("hidden");

welcomePage.classList.remove("hidden");

},700);

},1800);

</script>

</body>
</html>
