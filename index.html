<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EthioDating</title>

<style>
body{
margin:0;
background:black;
color:white;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
}

#app{display:none;}

button{
padding:15px;
margin-top:20px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,pink,purple);
color:white;
font-size:16px;
}
</style>
</head>

<body>

<div id="splash">
<h1>❤️</h1>
<h2>EthioDating</h2>
<p>Loading...</p>
</div>

<div id="app">
<h1>Welcome 🎉</h1>
<button onclick="like()">Like</button>
<button onclick="dislike()">Dislike</button>
</div>

<script>

// splash fix
setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("app").style.display="flex";
},2000);

// functions
function like(){
alert("Liked ❤️");
}

function dislike(){
alert("Disliked ❌");
}

</script>

</body>
</html>
