<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Simple Dating App</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(to right,pink,purple);
  font-family:Arial;
}
  
  #login{
  background:white;
  padding:20px;
  border-radius:20px;
  text-align:center;
}

#app{
  display:none;
}
  
.card{
  background:rgba(255,255,255,0.2);

  backdrop-filter:blur(10px);

  padding:20px;
  border-radius:25px;

  text-align:center;
  width:320px;
  max-width:90%;

  transition:0.3s;
  box-shadow:0 8px 30px rgba(0,0,0,0.2);

  border:1px solid rgba(255,255,255,0.3);
  overflow:hidden;
position:relative;
}

 .card:hover{
  transform:scale(1.02);
}

img{
  width:100%;
  height:200px;

  transition:0.3s;
  object-fit:cover;

  border-radius:15px;

  filter:brightness(0.9);
}

  img:hover{
  transform:scale(1.05);
}

button{
  font-size:22px;
  margin:10px;
  padding:12px 16px;

  border:none;
  border-radius:15px;

  cursor:pointer;

  transition:0.2s;

  background:white;

  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

  button:active{
  transform:scale(0.9);
}

  input{
  padding:12px;
  border-radius:10px;
  border:none;

  width:80%;

  font-size:18px;

  outline:none;
}
.likeBtn{
  background:#ff4b91;
  color:white;
}

.dislikeBtn{
  background:#444;
  color:white;
}

  #status{
  color:limegreen;
  font-weight:bold;
}

#distance{
  color:white;
  opacity:0.8;
}
  
  #count{
  font-weight:bold;
}
  
  .dark{
  background:black;
  color:white;
}
.dark .card{
  background:#222;
}
  
  #toast{
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: black;
  color: white;
  padding: 10px 20px;
  border-radius: 10px;
  opacity: 0;
  transition: opacity 0.3s;
}
  #match{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.5);

  background:linear-gradient(to right,#ff4b91,#ff0066);
  color:white;

  padding:30px 50px;
  border-radius:30px;

  font-size:28px;
  text-align:center;
  width:260px;
  font-weight:bold;

  box-shadow:0 0 30px rgba(0,0,0,0.4);

  display:none;
  opacity:0;

  transition:0.3s;
  z-index:1000;
}

  #likesPage{
  display:none;

  position:fixed;

  top:50%;
  left:50%;

  transform:translate(-50%,-50%);

  background:white;

  padding:20px;

  border-radius:20px;

  width:250px;

  z-index:3000;

  text-align:center;

  color:black;
}
  
  #profilePage{
  display:none;

  position:fixed;

  top:50%;
  left:50%;

  transform:translate(-50%,-50%);

  background:white;

  padding:20px;

  border-radius:20px;

  width:250px;

  z-index:3000;

  text-align:center;

  color:black;
}
  
#chat{
  z-index:2000;
color:black;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  border-radius:20px;
  display:none;
  width:250px;
}

    #menuBtn{
  position:absolute;
  top:10px;
  right:10px;

  width:45px;
  height:45px;

  border-radius:50%;
}
  #menu{
  display:none;

  position:absolute;

  top:60px;
  right:10px;

  background:white;

  padding:10px;

  border-radius:15px;

  box-shadow:0 5px 20px rgba(0,0,0,0.2);

  z-index:1000;
}

#menu button{
  display:block;
  width:100%;
}

#navbar{
  position:fixed;

  bottom:0;
  left:0;

  width:100%;

  background:white;

  display:flex;

  justify-content:space-around;

  padding:10px;

  z-index:2000;
}

#navbar button{
  background:none;
  box-shadow:none;

  font-size:18px;
}

  #status{
  animation:pulse 1s infinite;
}

@keyframes pulse{

0%{
  opacity:1;
}

50%{
  opacity:0.4;
}

100%{
  opacity:1;
}

}
  
</style>
</head>

<body>
  <div id="loading">
  ❤️ EthioDating
</div>
  <audio id="likeSound">
<source src="https://www.soundjay.com/buttons/sounds/button-3.mp3">
</audio>

<div id="navbar">

<button onclick="showHome()">
🏠
</button>

<button onclick="showLikesPage()">
❤️
</button>

<button onclick="openChat()">
💬
</button>

<button onclick="showProfile()">
👤
</button>

</div>
  <div id="login">
  <h2>Login</h2>

  <input id="username"
placeholder="Your name">

  <br><br>

  <button onclick="login()">Enter</button>
</div>

<div class="card" id="app">
  <img id="photo">
  <h2>
  <span id="name"></span>

<span style="color:#00bfff">
✔️ Verified
</span>
</h2>
  <p id="bio"></p>
  <p id="status">🟢 Online</p>
  <p id="distance">📍 2 km away</p>

  <button class="dislikeBtn" onclick="dislike()">❌</button>
  <button class="likeBtn" onclick="like()">❤️</button>
  <button id="menuBtn"
onclick="toggleMenu()">⋮</button>

<div id="menu">
  <button onclick="viewLikes()">📋 Likes</button>

  <button onclick="darkMode()">🌙 Dark</button>

  <button onclick="openChat()">💬 Chat</button>
</div>
  
  <p id="count">Likes: 0</p>
  
</div> 
  <div id="likesPage">

<h2>❤️ Liked People</h2>

<p id="likedNames">
No likes yet
</p>

<button onclick="closeLikesPage()">
Close
</button>

</div>
<div id="toast"></div>
<div id="match">
  ❤️ MATCHED ❤️
</div>
  <div id="profilePage">

<h2>👤 My Profile</h2>

<p>Name:
<span id="profileName">
User
</span>
</p>

<p>Premium User 💎</p>

<button onclick="closeProfile()">
Close
</button>

</div>
  <div id="chat">
  <h3>💬 Chat</h3>

  <div id="messages">
    <p id="typing" style="display:none">
💬 typing...
</p>
    <p>Hello 👋</p>
  </div>

  <input id="msgInput"
  placeholder="Type message">

  <br><br>

  <button onclick="sendMessage()">
    Send
  </button>

  <button onclick="closeChat()">
    Close
  </button>
</div>
<script>
let users = [
  {name:"Sara", bio:"Love music 🎵", img:"https://i.pravatar.cc/300?img=1"},
  {name:"Abel", bio:"Gym 💪", img:"https://i.pravatar.cc/300?img=8"},
  {name:"Liya", bio:"Travel ✈️", img:"https://i.pravatar.cc/300?img=5"},
  {name:"Dani", bio:"Football ⚽", img:"https://i.pravatar.cc/300?img=12"},
  {name:"Miki", bio:"Coding 💻", img:"https://i.pravatar.cc/300?img=15"}
];

  let i = 0;
  let liked = [];
  let startX = 0;
  let card = document.querySelector(".card");

card.addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
});

card.addEventListener("touchend", e=>{
  let endX = e.changedTouches[0].clientX;

  if(endX - startX > 50){
    like();
  }

  if(startX - endX > 50){
    dislike();
  }
});
  
  function showToast(msg){
  let t = document.getElementById("toast");
  t.innerText = msg;
  t.style.opacity = 1;

  setTimeout(()=>{
    t.style.opacity = 0;
  }, 500);
}

function show(){
  document.querySelector(".card").style.opacity =
"0";
  setTimeout(()=>{
  document.querySelector(".card").style.opacity =
  "1";
},100);
  document.getElementById("name").innerText = users[i].name;
  document.getElementById("bio").innerText = users[i].bio;
  document.getElementById("photo")
.style.opacity = "0";
  setTimeout(()=>{
document.getElementById("photo")
.style.opacity = "1";
},200);
  document.getElementById("photo").src = users[i].img;
}
function next(){
  i++;
  if(i >= users.length){
    i = 0;
  }

  setTimeout(()=>{

document.getElementById("loading")
.style.display = "none";

},2000);
  show();
}
  
function like(){
  liked.push(users[i]);

  document.getElementById("count").innerText =
"Likes: " + liked.length;
  
  document.querySelector(".card").style.transform =
  "translateX(300px) rotate(20deg)";
  
  showToast("Liked " + users[i].name);
  document.getElementById("likeSound")
.play();
  showMatch();

  setTimeout(()=>{
    document.querySelector(".card").style.transform =
    "translateX(0)";

    next();
  },300);
}

function dislike(){
  document.querySelector(".card").style.transform =
  "translateX(-300px) rotate(-20deg)";

  showToast("Disliked " + users[i].name);

  setTimeout(()=>{
    document.querySelector(".card").style.transform =
    "translateX(0)";

    next();
  },300);
}
  function showMatch(){
  let m = document.getElementById("match");

  m.style.display = "block";

  setTimeout(()=>{
    m.style.opacity = "1";
    m.style.transform =
    "translate(-50%,-50%) scale(1)";
  },10);

  setTimeout(()=>{
    m.style.opacity = "0";
    m.style.transform =
    "translate(-50%,-50%) scale(0.5)";
  },300);

setTimeout(()=>{
  m.style.display = "none";
},500);
}

  function login(){
  let name =
  document.getElementById("username").value;

  if(name != ""){
    document.getElementById("login").style.display =
    "none";

    document.getElementById("app").style.display =
    "block";
   }
  }
  function toggleMenu(){

  let menu =
  document.getElementById("menu");

  if(menu.style.display == "block"){

    menu.style.display = "none";

  }else{

    menu.style.display = "block";

    setTimeout(()=>{
      menu.style.display = "none";
    },3000);

  }
}
  
function openChat(){
  document.getElementById("chat").style.display = "block";
}

 function sendMessage(){
  let input =
  document.getElementById("msgInput");

  let messages =
  document.getElementById("messages");

  if(input.value != ""){
    messages.innerHTML +=
   "<div class='me'>🧑 " + input.value + "</div>";

    input.value = "";
    document.getElementById("typing")
.style.display = "block";

setTimeout(()=>{

document.getElementById("typing")
.style.display = "none";

messages.innerHTML +=
"<div class='them'>❤️ Nice to meet you</div>";

},1000);
  }
}
function closeChat(){
  document.getElementById("chat").style.display = "none";
}
  
function darkMode(){
  document.body.classList.toggle("dark");
}

  function showLikesPage(){

  document.getElementById("likesPage")
  .style.display = "block";

  let names = liked.map(x => x.name)
  .join(", ");

  if(names == ""){
    names = "No likes yet";
  }

  document.getElementById("likedNames")
  .innerText = names;
}

function closeLikesPage(){
  document.getElementById("likesPage")
  .style.display = "none";
}

function showProfile(){

  document.getElementById("profilePage")
  .style.display = "block";

  let username =
  document.getElementById("username")
  .value;

  document.getElementById("profileName")
  .innerText = username;
}

function closeProfile(){
  document.getElementById("profilePage")
  .style.display = "none";
}

function showHome(){

  document.getElementById("profilePage")
  .style.display = "none";

  document.getElementById("likesPage")
  .style.display = "none";

  document.getElementById("chat")
  .style.display = "none";
}
  
function viewLikes(){
  let names = liked.map(x => x.name).join(", ");

  if(names == ""){
    alert("No likes yet");
  }else{
    alert("Liked people: " + names);
  }
}
show();
</script>

</body>
</html>
