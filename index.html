<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>EthioLove</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#ff4458;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

#app{
width:100%;
max-width:400px;
height:100vh;
background:white;
position:relative;
overflow:hidden;
}

#topBar{
height:70px;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
font-size:25px;
font-weight:bold;
color:#ff4458;
border-bottom:1px solid #eee;
}

#card{
width:90%;
height:520px;
background:#eee;
margin:20px auto;
border-radius:25px;
overflow:hidden;
position:relative;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

#card img{
width:100%;
height:100%;
object-fit:cover;
}

#info{
position:absolute;
bottom:0;
left:0;
width:100%;
padding:20px;
background:linear-gradient(
transparent,
rgba(0,0,0,0.9)
);
color:white;
}

#buttons{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
}

.actionBtn{
width:70px;
height:70px;
border:none;
border-radius:50%;
font-size:30px;
cursor:pointer;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.nope{
background:white;
}

.like{
background:#ff4458;
color:white;
}

#bottomNav{
position:absolute;
bottom:0;
width:100%;
height:70px;
background:white;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #eee;
font-size:28px;
}

</style>
</head>

<body>

<div id="app">

<div id="topBar">

<div>🔥 EthioLove</div>

<div>💬</div>

</div>

<div id="card">

<img id="photo"
src="https://i.pravatar.cc/500?img=12">

<div id="info">

<h2 id="name">
Sara, 22
</h2>

<p id="bio">
Love music and travel ❤️
</p>

</div>

</div>

<div id="buttons">

<button class="actionBtn nope"
onclick="dislike()">
❌
</button>

<button class="actionBtn like"
onclick="like()">
❤️
</button>

</div>

<div id="bottomNav">

<div>🏠</div>

<div>❤️</div>

<div>👤</div>

</div>

</div>

<script>

let users = [

{
name:"Sara",
age:22,
bio:"Love music ❤️",
img:"https://i.pravatar.cc/500?img=12"
},

{
name:"Liya",
age:21,
bio:"Travel girl ✈️",
img:"https://i.pravatar.cc/500?img=32"
},

{
name:"Betty",
age:24,
bio:"Coffee addict ☕",
img:"https://i.pravatar.cc/500?img=45"
}

];

let current = 0;

function showUser(){

document.getElementById("photo").src =
users[current].img;

document.getElementById("name").innerText =
users[current].name + ", " +
users[current].age;

document.getElementById("bio").innerText =
users[current].bio;

}

function nextUser(){

current++;

if(current >= users.length){

current = 0;

}

showUser();

}

function like(){

nextUser();

}

function dislike(){

nextUser();

}

showUser();

</script>

</body>
</html>
