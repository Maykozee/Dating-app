<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EYORIKA</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Outfit',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#050505;
overflow:hidden;
color:white;
}

.hidden{
display:none !important;
}

.page{
position:absolute;
inset:0;
width:100%;
height:100vh;
}

/* ================= BACKGROUND ================= */

.main-bg{
position:absolute;
inset:0;
background:
radial-gradient(circle at top left, rgba(170,90,30,.35), transparent 35%),
radial-gradient(circle at bottom right, rgba(80,30,10,.30), transparent 35%),
linear-gradient(180deg,#050505 0%,#120904 55%,#1b120d 100%);
z-index:-3;
}

.noise{
position:absolute;
inset:0;
background:url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1200&auto=format&fit=crop');
background-size:cover;
background-position:center;
opacity:.04;
filter:blur(2px);
z-index:-2;
}

/* ================= ICON ================= */

.app-icon{
width:120px;
height:120px;
border-radius:38px;
margin:auto;
position:relative;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
background:linear-gradient(145deg,#fff4dd,#d89b57,#2d1809);
border:1px solid rgba(255,255,255,.14);
box-shadow:
0 0 40px rgba(255,190,120,.22),
0 20px 60px rgba(0,0,0,.70);
animation:floatIcon 4s ease-in-out infinite;
}

.app-icon::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(135deg,transparent,rgba(255,255,255,.16),transparent);
}

.app-icon::after{
content:"";
position:absolute;
width:160%;
height:40px;
background:rgba(255,255,255,.18);
transform:rotate(-35deg) translateY(-140px);
animation:iconShine 4s linear infinite;
}

.e-icon{
width:78px;
height:78px;
display:flex;
flex-direction:column;
justify-content:center;
gap:10px;
position:relative;
z-index:2;
}

.e-bar{
height:12px;
border-radius:40px;
background:linear-gradient(90deg,#ffffff,#ffe0b0,#8f5b2e);
box-shadow:0 0 14px rgba(255,220,170,.50);
}

.e-top,
.e-bottom{
width:76px;
}

.e-middle{
width:52px;
}

/* ================= LOADING PAGE ================= */

#loadingPage{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.light-beam{
position:absolute;
left:-140px;
width:180px;
height:130vh;
background:linear-gradient(180deg,transparent,rgba(255,210,120,.10),transparent);
filter:blur(10px);
transform:rotate(28deg);
animation:beamMove 6s linear infinite;
}

.loading-title{
margin-top:34px;
font-size:58px;
font-weight:800;
letter-spacing:7px;
font-family:'Syne',sans-serif;
background:linear-gradient(90deg,#fff6e7,#f5ca8d,#8f5b2e);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.loading-sub{
margin-top:14px;
font-size:13px;
letter-spacing:5px;
color:#d4b18c;
}

.loader{
width:230px;
height:7px;
margin-top:38px;
background:rgba(255,255,255,.08);
border-radius:30px;
overflow:hidden;
}

.loader-fill{
width:0%;
height:100%;
border-radius:30px;
background:linear-gradient(90deg,#8f5b2e,#f5cf96,#fff8ee);
animation:loadBar 1.8s ease forwards;
}

.socials{
display:flex;
gap:22px;
margin-top:34px;
}

.socials img{
width:54px;
height:54px;
padding:12px;
border-radius:20px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);
box-shadow:0 0 20px rgba(255,190,120,.12);
}

/* ================= WELCOME PAGE ================= */

#welcomePage{

display:flex;
align-items:center;
justify-content:center;

padding:40px 24px;

overflow:hidden;
position:relative;

}

.welcome-light{

position:absolute;

left:-180px;

width:220px;
height:130vh;

background:
linear-gradient(
180deg,
transparent,
rgba(255,210,120,.10),
transparent
);

filter:blur(10px);

transform:rotate(28deg);

animation:beamMove 7s linear infinite;

}

.welcome-card{

width:100%;
max-width:500px;

text-align:center;

position:relative;
z-index:2;

animation:cardShow .7s ease;

}

.hero-icon{

margin-bottom:34px;

transform:scale(1.08);

}

.brand{

font-size:64px;
font-weight:800;

letter-spacing:8px;

font-family:'Syne',sans-serif;

text-transform:uppercase;

background:
linear-gradient(
90deg,
#fff8ef,
#f5d098,
#8f5b2e
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 0 20px rgba(255,210,120,.12);

}

.title{
margin-top:22px;
font-size:40px;
line-height:1.2;
font-weight:800;
font-family:'Syne',sans-serif;
}

.subtitle{
margin-top:20px;
font-size:16px;
line-height:1.9;
color:#b8ada1;
}

.main-btn{
width:100%;
margin-top:34px;
padding:20px;
border:none;
border-radius:24px;
font-size:18px;
font-weight:800;
color:#050505;
cursor:pointer;
background:linear-gradient(135deg,#7a4821,#f7d49a,#fff7eb);
box-shadow:0 12px 40px rgba(255,190,120,.24);
transition:.35s;
}

.main-btn:hover{
transform:translateY(-3px);
box-shadow:0 16px 45px rgba(255,210,120,.34);
}

.small-text{
margin-top:22px;
font-size:13px;
line-height:1.7;
color:#8f8479;
}

/* ================= ANIMATIONS ================= */

@keyframes loadBar{
0%{width:0%;}
100%{width:100%;}
}

@keyframes beamMove{
100%{
transform:rotate(28deg) translateX(650px);
}
}

@keyframes floatIcon{
0%{transform:translateY(0px);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0px);}
}

@keyframes iconShine{
100%{
transform:rotate(-35deg) translateY(260px);
}
}

@keyframes cardShow{
from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}
}

/* ================= MOBILE ================= */

@media(max-width:480px){

.loading-title{
font-size:46px;
}

.brand{
font-size:48px;
letter-spacing:4px;
}

.title{
font-size:30px;
}

.welcome-card{
padding:40px 22px;
border-radius:34px;
}

.app-icon{
width:105px;
height:105px;
}

.subtitle{
font-size:15px;
line-height:1.7;
}

.main-btn{
padding:18px;
font-size:17px;
}

}

</style>
</head>

<body>

<div class="main-bg"></div>
<div class="noise"></div>

<!-- LOADING -->

<section id="loadingPage" class="page">

<div class="light-beam"></div>

<div class="app-icon">
<div class="e-icon">
<div class="e-bar e-top"></div>
<div class="e-bar e-middle"></div>
<div class="e-bar e-bottom"></div>
</div>
</div>

<div class="loading-title">EYORIKA</div>

<div class="loading-sub">
WELCOME TO EYORIKA
</div>

<div class="loader">
<div class="loader-fill"></div>
</div>

<div class="socials">
<img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
</div>

</section>

<!-- WELCOME -->

<section id="welcomePage" class="page hidden">

<div class="welcome-glow"></div>

<div class="welcome-light"></div>
  
<div class="welcome-card">

<div class="app-icon hero-icon">
<div class="e-icon">
<div class="e-bar e-top"></div>
<div class="e-bar e-middle"></div>
<div class="e-bar e-bottom"></div>
</div>
</div>

<div class="brand">EYORIKA</div>

<div class="title">
Grow Faster.<br>
Go Viral.
</div>

<div class="subtitle">
Smart tools for TikTok and Instagram creators with premium creator experience.
</div>

<button class="main-btn">
Get Started
</button>

</div>

</section>

<script>

setTimeout(()=>{

const loadingPage = document.getElementById("loadingPage");
const welcomePage = document.getElementById("welcomePage");

loadingPage.style.transition = ".7s ease";
loadingPage.style.opacity = "0";

setTimeout(()=>{
loadingPage.classList.add("hidden");
welcomePage.classList.remove("hidden");
},700);

},2000);

</script>

</body>
</html>
