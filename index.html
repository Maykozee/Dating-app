<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TokBoost</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050505;
overflow:hidden;
height:100vh;
color:white;
}

/* ================= LOADING ================= */

#loading{
position:fixed;
width:100%;
height:100%;
background:#050505;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
transition:1s;
}

.loader-ring{
width:90px;
height:90px;
border:6px solid rgba(255,255,255,0.1);
border-top:6px solid #ff0050;
border-right:6px solid #00f2ea;
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:25px;
}

.loading-text{
font-size:22px;
font-weight:bold;
background:linear-gradient(90deg,#ff0050,#00f2ea);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
letter-spacing:1px;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

/* ================= MAIN ================= */

.main{
position:relative;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* glowing backgrounds */

.bg1{
position:absolute;
width:350px;
height:350px;
background:#ff0050;
filter:blur(140px);
border-radius:50%;
top:-120px;
left:-120px;
opacity:0.5;
animation:move1 7s infinite alternate;
}

.bg2{
position:absolute;
width:350px;
height:350px;
background:#00f2ea;
filter:blur(140px);
border-radius:50%;
bottom:-120px;
right:-120px;
opacity:0.5;
animation:move2 8s infinite alternate;
}

@keyframes move1{
100%{
transform:translate(70px,40px);
}
}

@keyframes move2{
100%{
transform:translate(-60px,-50px);
}
}

/* follower animation */

.counter-box{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:70px;
font-weight:bold;
opacity:0.08;
animation:pulse 2s infinite;
}

@keyframes pulse{
50%{
transform:translate(-50%,-50%) scale(1.08);
}
}

/* card */

.card{
position:relative;
width:90%;
max-width:390px;
padding:40px 28px;
background:rgba(255,255,255,0.07);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(22px);
border-radius:32px;
text-align:center;
z-index:5;
box-shadow:0 0 40px rgba(0,0,0,0.4);
animation:fadeUp 1.3s ease;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.logo{
font-size:44px;
font-weight:bold;
margin-bottom:14px;
background:linear-gradient(90deg,#ff0050,#00f2ea);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.title{
font-size:30px;
font-weight:bold;
line-height:1.3;
margin-bottom:14px;
}

.subtitle{
font-size:15px;
line-height:1.7;
color:#d0d0d0;
margin-bottom:35px;
}

/* button */

.btn{
position:relative;
width:100%;
padding:17px;
border:none;
border-radius:18px;
background:linear-gradient(90deg,#ff0050,#00f2ea);
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
overflow:hidden;
box-shadow:0 0 25px rgba(255,0,80,0.5);
transition:0.3s;
}

.btn:hover{
transform:scale(1.03);
}

.btn::before{
content:"";
position:absolute;
top:0;
left:-120%;
width:60%;
height:100%;
background:rgba(255,255,255,0.3);
transform:skewX(-20deg);
animation:shine 2.5s infinite;
}

@keyframes shine{
100%{
left:160%;
}
}

/* floating text */

.floating{
position:absolute;
font-size:14px;
color:white;
opacity:0.18;
animation:floatText 10s linear infinite;
}

@keyframes floatText{
0%{
transform:translateY(120vh);
opacity:0;
}
10%{
opacity:0.18;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}

.note{
margin-top:18px;
font-size:12px;
color:#a0a0a0;
line-height:1.6;
}

</style>
</head>
<body>

<!-- loading -->

<div id="loading">

<div class="loader-ring"></div>

<div class="loading-text">
TokBoost
</div>

</div>

<!-- main -->

<div class="main">

<div class="bg1"></div>
<div class="bg2"></div>

<div class="counter-box" id="counter">
0
</div>

<div class="floating" style="left:10%">+10 Followers</div>
<div class="floating" style="left:75%;animation-delay:2s">Viral Video</div>
<div class="floating" style="left:50%;animation-delay:4s">Trending</div>

<div class="card">

<div class="logo">
TokBoost
</div>

<div class="title">
Grow Your TikTok Faster
</div>

<div class="subtitle">
Discover creators, boost engagement, earn coins, and grow your audience with modern creator tools.
</div>

<button class="btn" onclick="nextPage()">
Get Started
</button>

<div class="note">
English • አማርኛ • ትግርኛ • Afaan Oromo
</div>

</div>

</div>

<script>

/* loading */

setTimeout(()=>{
document.getElementById("loading").style.opacity="0";

setTimeout(()=>{
document.getElementById("loading").style.display="none";
},1000);

},3000);

/* counter */

let count = 0;

let counter = document.getElementById("counter");

let interval = setInterval(()=>{

count += 7;

counter.innerHTML = count + "+";

if(count >= 1000){

clearInterval(interval);

counter.innerHTML = "1000+";

}

},25);

/* next page */

function nextPage(){

alert("Next Page Coming Soon");

}

</script>

</body>
</html>
