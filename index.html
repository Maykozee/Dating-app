<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Simple Dating App</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(to right,pink,purple);
  font-family:Arial;
}
  
  #login{
  background:white;
  padding:20px;
  border-radius:20px;
  text-align:center;
}

#app{
  display:none;
}
  
.card{
  background:rgba(255,255,255,0.2);

  backdrop-filter:blur(10px);

  padding:20px;
  border-radius:25px;

  text-align:center;
  width:320px;
  max-width:90%;

  transition:0.3s;
  box-shadow:0 8px 30px rgba(0,0,0,0.2);

  border:1px solid rgba(255,255,255,0.3);
  overflow:hidden;
position:relative;
}

 .card:hover{
  transform:scale(1.03) rotate(1deg);
   box-shadow:0 0 40px pink;
   background:rgba(255,255,255,0.3);
}

img{
  width:100%;
  height:200px;

  transition:0.3s;
  object-fit:cover;

  border-radius:15px;

  filter:brightness(0.9);
}

  img:hover{
  transform:scale(1.05);
    box-shadow:0 0 20px white;
}

button{
  font-size:22px;
  margin:10px;
  padding:12px 16px;

  border:none;
  border-radius:15px;

  cursor:pointer;

  transition:0.2s;

  background:white;

  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

  button:hover{
  box-shadow:0 0 20px white;

  transform:translateY(-3px);
}
  
  button:active{
  transform:scale(0.9);
}

  input{
  padding:12px;
  border-radius:10px;
  border:none;

  width:80%;

  font-size:18px;

  outline:none;
}

  #searchInput{
  margin-top:10px;

  background:white;

  color:black;

  box-shadow:0 0 15px rgba(255,255,255,0.5);
}
  
  input:focus{
  box-shadow:0 0 15px #ff4b91;

  border:2px solid #ff4b91;

  transform:scale(1.03);
}
  
#searchInput{
  margin-bottom:10px;
}
  
.likeBtn{
  background:#ff4b91;
  color:white;
}

.dislikeBtn{
  background:#444;
  color:white;
}

  #status{
  color:limegreen;
  font-weight:bold;
}

#distance{
  color:white;
  opacity:0.8;
}

  #verified{
  color:#00bfff;

  text-shadow:0 0 10px #00bfff;
}

#premium{
  color:purple;

  font-weight:bold;

  animation:pulse 1s infinite;
}

#liveUsers{
  color:yellow;

  font-weight:bold;

  animation:pulse 1s infinite;
}
  
  #count{
  font-weight:bold;
}
  
  .dark{
  background:black;
  color:white;
}
.dark .card{
  background:#222;
}

  #notify{
  position:fixed;

  top:20px;
  right:20px;

  background:white;

  color:black;

  padding:10px 20px;

  border-radius:15px;

  box-shadow:0 5px 15px rgba(0,0,0,0.3);

  animation:pulse 1s infinite;
}
  
  #toast{
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: black;
  color: white;
  padding: 10px 20px;
  border-radius: 10px;
  opacity: 0;
  transition: opacity 0.3s;
}
  #match{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.5);

  background:linear-gradient(to right,#ff4b91,#ff0066);
  color:white;

  padding:30px 50px;
  border-radius:30px;

  font-size:28px;
  text-align:center;
  width:260px;
  font-weight:bold;

  box-shadow:0 0 30px rgba(0,0,0,0.4);

  display:none;
  opacity:0;

  transition:0.3s;
  z-index:1000;
}

  #likesPage{
  display:none;

  position:fixed;

  top:50%;
  left:50%;

  transform:translate(-50%,-50%);

  background:white;

  padding:20px;

  border-radius:20px;

  width:250px;

  z-index:3000;

  text-align:center;

  color:black;
}
  
  #profilePage{
  display:none;

  position:fixed;

  top:50%;
  left:50%;

  transform:translate(-50%,-50%);

  background:white;

  padding:20px;

  border-radius:20px;

  width:250px;

  z-index:3000;

  text-align:center;

  color:black;
}
  
#chat{
  z-index:2000;
color:black;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  border-radius:20px;
  display:none;
  width:250px;
}

    #menuBtn{
  position:absolute;
  top:10px;
  right:10px;

  width:45px;
  height:45px;

  border-radius:50%;
    }

      #menuBtn:hover{
  transform:rotate(90deg);

  background:#ff4b91;

  color:white;
}
      
  #menu{
  display:none;

  position:absolute;

  top:60px;
  right:10px;

  background:white;

  padding:10px;

  border-radius:15px;

  box-shadow:0 10px 40px rgba(0,0,0,0.4);

  z-index:1000;
}

#menu button{
  display:block;
  width:100%;
}

#navbar{
  position:fixed;

  bottom:0;
  left:0;

  width:100%;

  background:white;

  display:flex;

  justify-content:space-around;

  padding:10px;

  z-index:2000;
}
  
#navbar button:hover{
  transform:translateY(-5px);

  color:#ff4b91;
}

  #loading{
  position:fixed;

  top:0;
  left:0;

  width:100%;
  height:100%;

  background:black;

  color:white;

  display:flex;

  justify-content:center;
  align-items:center;

  font-size:35px;

  z-index:5000;
}
  
#navbar button{
  background:none;
  box-shadow:none;

  font-size:18px;
}

  .me{
  background:#ff4b91;
  color:white;

  padding:10px;

  border-radius:15px;

  margin:8px;

  text-align:right;
}

  #myPhoto{
  width:120px;

  height:120px;

  border-radius:50%;

  object-fit:cover;

  border:4px solid #ff4b91;

  margin-top:10px;
}
  
.them{
  background:#eee;

  padding:10px;

  border-radius:15px;

  margin:8px;

  text-align:left;
}
  
  #status{
  animation:pulse 0.7s infinite;
}

  #loading{
  position:fixed;
  top:0;
  left:0;

  width:100%;
  height:100%;

  background:black;

  color:white;

  display:flex;

  justify-content:center;
  align-items:center;

  font-size:35px;

  z-index:5000;
}

  #typing span{
  animation:pulse 1s infinite;
}
  
@keyframes pulse{

0%{
  opacity:1;
}

50%{
  opacity:0.4;
}

100%{
  opacity:1;
}

}
  
</style>
</head>

<body>
  <div id="loading">
  ❤️ EthioDating
</div>
<audio id="likeSound">
<source src="https://www.soundjay.com/buttons/sounds/button-3.mp3">
</audio>
  
<audio id="matchSound">
<source src="https://www.soundjay.com/buttons/sounds/button-09.mp3">
</audio>

<div id="navbar">

<button onclick="showHome()">
🏠
</button>

<button onclick="showLikesPage()">
❤️
</button>

<button onclick="openChat()">
💬
</button>

<button onclick="showProfile()">
👤
</button>

</div>
  <div id="login">
  <h2>Login</h2>

  <input id="username"
placeholder="Your name">

  <br><br>

  <button onclick="login()">Enter</button>
</div>

<div class="card" id="app">
  
<input id="searchInput"
placeholder="Search name">

<button onclick="searchUser()">
🔍
</button>
  <img id="photo">
  <h2>
  <span id="name"></span>

<span style="color:#00bfff">
<span id="verified">
✔️ Verified
</span>
</span>
</h2>
  <p id="bio"></p>
  <p id="status">🟢 Online</p>
  <p id="distance">📍 2 km away</p>
  <p id="liveUsers">
🔥 120 online now
</p>
  
  <input id="searchInput"
placeholder="Search name..."
onkeyup="searchUser()">

  <button class="dislikeBtn" onclick="dislike()">❌</button>
  <button class="likeBtn" onclick="like()">❤️</button>
  <button onclick="superLike()">
💙
</button>
  <button id="menuBtn"
onclick="toggleMenu()">⋮</button>

<div id="menu">
  <button onclick="viewLikes()">📋 Likes</button>

  <button onclick="darkMode()">🌙 Dark</button>

  <button onclick="openChat()">💬 Chat</button>
</div>
  
  <p id="count">Likes: 0</p>
  
</div> 
  <div id="likesPage">

<h2>❤️ Liked People</h2>

<p id="likedNames">
No likes yet
</p>

<button onclick="closeLikesPage()">
Close
</button>

</div>
<div id="toast"></div>
  <div id="notify">
🔔 New people joined
</div>
<div id="match">
  ❤️ MATCHED ❤️
</div>
  <div id="profilePage">

<h2>👤 My Profile</h2>

<p>Name:
<span id="profileName">
User
</span>
</p>
<p id="myBio">
I love coding 💻
</p>

<p id="premium">
Premium User 💎
</p>

<img id="myPhoto"
src="https://i.pravatar.cc/150?img=10">

<br><br>

<input type="file"
id="uploadPhoto">

<button onclick="editProfile()">
Edit
</button>
<button onclick="editBio()">
Edit Bio
</button>
    
<button onclick="closeProfile()">
Close
</button>

</div>
  <div id="chat">
  <h3>💬 Chat</h3>

  <div id="messages">
    <p id="typing" style="display:none">
💬 typing...
<span>.</span>
<span>.</span>
<span>.</span>
</p>
    <p>Hello 👋</p>
  </div>

  <input id="msgInput"
  placeholder="Type message">

  <br><br>

  <button onclick="sendMessage()">
    Send
  </button>

  <button onclick="closeChat()">
    Close
  </button>
</div>
<script>
let users = [

{
name:"Sara",
age:22,
bio:"Love music 🎵",
img:"https://i.pravatar.cc/300?img=1"
},

{
name:"Abel",
age:25,
bio:"Gym 💪",
img:"https://i.pravatar.cc/300?img=8"
},

{
name:"Liya",
age:21,
bio:"Travel ✈️",
img:"https://i.pravatar.cc/300?img=5"
},

{
name:"Dani",
age:24,
bio:"Football ⚽",
img:"https://i.pravatar.cc/300?img=12"
},

{
name:"Miki",
age:23,
bio:"Coding 💻",
img:"https://i.pravatar.cc/300?img=15"
}

];

  let i = 0;
  let liked = [];
  let startX = 0;
  let card = document.querySelector(".card");

card.addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
});

card.addEventListener("touchend", e=>{
  let endX = e.changedTouches[0].clientX;

  if(endX - startX > 50){
    like();
  }

  if(startX - endX > 50){
    dislike();
  }
});
  
  function showToast(msg){
  let t = document.getElementById("toast");
  t.innerText = msg;
  t.style.opacity = 1;

  setTimeout(()=>{
    t.style.opacity = 0;
  }, 500);
}

function show(){
  document.querySelector(".card").style.opacity =
"0";
  setTimeout(()=>{
  document.querySelector(".card").style.opacity =
  "1";
},100);
  document.getElementById("name").innerText =
users[i].name + ", " + users[i].age;
  document.getElementById("bio").innerText = users[i].bio;
  let randomKm =
Math.floor(Math.random()*10)+1;

document.getElementById("distance")
.innerText =
"📍 " + randomKm + " km away";
  document.getElementById("photo")
.style.opacity = "0";
  setTimeout(()=>{
document.getElementById("photo")
.style.opacity = "1";
},200);
  document.getElementById("photo").src = users[i].img;
}
function next(){
  i++;
  if(i >= users.length){
    i = 0;
  }

  setTimeout(()=>{

document.getElementById("loading")
.style.display = "none";

},2000);

  setTimeout(()=>{

document.getElementById("notify")
.style.display = "none";

},4000);

  function searchUser(){

let text =
document.getElementById("searchInput")
.value.toLowerCase();

for(let x=0; x<users.length; x++){

if(users[x].name.toLowerCase()
.includes(text)){

i = x;

show();

showToast("Found " + users[x].name);

}

}

}
  
  show();
}
  
function like(){
  liked.push(users[i]);

  document.getElementById("count").innerText =
"Likes: " + liked.length;
  
  document.querySelector(".card").style.transform =
  "translateX(300px) rotate(20deg)";
  
  showToast("Liked " + users[i].name);
  document.getElementById("likeSound")
.play();
  showMatch();
  document.getElementById("matchSound")
.play();

  setTimeout(()=>{
    document.querySelector(".card").style.transform =
    "translateX(0)";

    next();
  },300);
}

  function superLike(){

showToast("SUPER LIKE 💙");

next();

}
function dislike(){
  document.querySelector(".card").style.transform =
  "translateX(-300px) rotate(-20deg)";

  showToast("Disliked " + users[i].name);

  setTimeout(()=>{
    document.querySelector(".card").style.transform =
    "translateX(0)";

    next();
  },300);
}
  function showMatch(){
  let m = document.getElementById("match");

  m.style.display = "block";

  setTimeout(()=>{
    m.style.opacity = "1";
    m.style.transform =
    "translate(-50%,-50%) scale(1)";
  },10);

  setTimeout(()=>{
    m.style.opacity = "0";
    m.style.transform =
    "translate(-50%,-50%) scale(0.5)";
  },300);

setTimeout(()=>{
  m.style.display = "none";
},500);
}

  setTimeout(()=>{

document.getElementById("loading")
.style.display = "none";

},2000);
  
  function login(){
  let name =
  document.getElementById("username").value;

  if(name != ""){
    document.getElementById("login").style.display =
    "none";

    document.getElementById("app").style.display =
    "block";
   }
  }
  function toggleMenu(){

  let menu =
  document.getElementById("menu");

  if(menu.style.display == "block"){

    menu.style.display = "none";

  }else{

    menu.style.display = "block";

    setTimeout(()=>{
      menu.style.display = "none";
    },3000);

  }
}
  
function openChat(){
  document.getElementById("chat").style.display = "block";
}

 function sendMessage(){
  let input =
  document.getElementById("msgInput");

  let messages =
  document.getElementById("messages");

  if(input.value != ""){
    messages.innerHTML +=
   "<div class='me'>🧑 " + input.value + "</div>";

    input.value = "";
    document.getElementById("typing")
.style.display = "block";

setTimeout(()=>{

document.getElementById("typing")
.style.display = "none";

messages.innerHTML +=
"<div class='them'>❤️ Nice to meet you</div>";

},1000);
  }
}
function closeChat(){
  document.getElementById("chat").style.display = "none";
}
  
function darkMode(){
  document.body.classList.toggle("dark");
}

  function showLikesPage(){

  document.getElementById("likesPage")
  .style.display = "block";

  let names = liked.map(x => x.name)
  .join(", ");

  if(names == ""){
    names = "No likes yet";
  }

  document.getElementById("likedNames")
  .innerText = names;
}

function closeLikesPage(){
  document.getElementById("likesPage")
  .style.display = "none";
}

function showProfile(){

  document.getElementById("profilePage")
  .style.display = "block";

  let username =
  document.getElementById("username")
  .value;

  document.getElementById("profileName")
  .innerText = username;
}

  function editProfile(){

let newName = prompt("New name");

if(newName != ""){

document.getElementById("profileName")
.innerText = newName;

}

}

  function editBio(){

let newBio =
prompt("New bio");

if(newBio != ""){

document.getElementById("myBio")
.innerText = newBio;

}

}
  
function closeProfile(){
  document.getElementById("profilePage")
  .style.display = "none";
}

function showHome(){

  document.getElementById("profilePage")
  .style.display = "none";

  document.getElementById("likesPage")
  .style.display = "none";

  document.getElementById("chat")
  .style.display = "none";
}
  
function viewLikes(){
  let names = liked.map(x => x.name).join(", ");

  if(names == ""){
    alert("No likes yet");
  }else{
    alert("Liked people: " + names);
  }
}

  document.getElementById("uploadPhoto")
.addEventListener("change", function(e){

let file =
e.target.files[0];

if(file){

let reader =
new FileReader();

reader.onload = function(){

document.getElementById("myPhoto")
.src = reader.result;

};

reader.readAsDataURL(file);

}

});
show();
</script>

</body>
</html>
