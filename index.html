<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ethio Love</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#111;
color:white;
overflow-x:hidden;
}

/* LOADING */

#loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

.loader{
width:80px;
height:80px;
border-radius:50%;
border:8px solid #333;
border-top:8px solid #ff0055;
animation:spin 1s linear infinite;
margin-bottom:20px;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

/* WELCOME */

#welcome{
height:100vh;
background:url("https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=1200") center/cover;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
}

#welcome::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
top:0;
left:0;
}

.welcomeBox{
position:relative;
z-index:2;
padding:20px;
}

.welcomeBox h1{
font-size:55px;
margin-bottom:10px;
}

.welcomeBox p{
font-size:20px;
opacity:0.9;
margin-bottom:20px;
}

.welcomeBox button{
padding:15px 30px;
border:none;
border-radius:30px;
background:#ff0055;
color:white;
font-size:20px;
cursor:pointer;
}

/* LOGIN */

#auth{
display:none;
padding:30px;
min-height:100vh;
background:linear-gradient(to bottom,#111,#222);
}

.authBox{
background:#1e1e1e;
padding:25px;
border-radius:20px;
max-width:400px;
margin:auto;
margin-top:50px;
}

.authBox h2{
margin-bottom:20px;
text-align:center;
}

.authBox input{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:12px;
background:#333;
color:white;
font-size:16px;
}

.authBox button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#ff0055;
color:white;
font-size:18px;
}

/* APP */

#app{
display:none;
padding-bottom:100px;
}

/* TOPBAR */

.topbar{
position:fixed;
top:0;
left:0;
width:100%;
background:#111;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:1000;
}

.logo{
font-size:28px;
font-weight:bold;
color:#ff0055;
}

.menuBtn{
font-size:30px;
cursor:pointer;
}

/* MENU */

#menu{
position:fixed;
top:0;
right:-300px;
width:260px;
height:100%;
background:#1b1b1b;
padding:20px;
transition:0.4s;
z-index:2000;
}

#menu button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:12px;
background:#333;
color:white;
font-size:17px;
}

/* STORIES */

#stories{
display:flex;
overflow-x:auto;
gap:15px;
padding:90px 15px 10px;
}

.story{
text-align:center;
}

.story img{
width:75px;
height:75px;
border-radius:50%;
border:3px solid #ff0055;
object-fit:cover;
}

.story p{
font-size:14px;
margin-top:5px;
}

/* CARD */

.card{
width:90%;
max-width:400px;
margin:auto;
background:#1e1e1e;
border-radius:25px;
overflow:hidden;
margin-top:15px;
position:relative;
box-shadow:0 0 25px rgba(0,0,0,0.5);
transition:0.3s;
}

.card img{
width:100%;
height:430px;
object-fit:cover;
}

.cardContent{
padding:20px;
}

.cardContent h2{
font-size:32px;
margin-bottom:10px;
}

.cardContent p{
opacity:0.9;
margin-bottom:8px;
}

.moreBtn{
background:#333;
padding:10px 18px;
border:none;
border-radius:10px;
color:white;
margin-top:10px;
}

/* ACTION BUTTONS */

.actions{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
}

.actions button{
width:70px;
height:70px;
border:none;
border-radius:50%;
font-size:28px;
cursor:pointer;
}

.like{
background:#ff0055;
color:white;
}

.dislike{
background:#444;
color:white;
}

.super{
background:#0099ff;
color:white;
}

/* BOTTOM NAV */

.bottomNav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#111;
display:flex;
justify-content:space-around;
padding:15px;
}

.bottomNav button{
background:none;
border:none;
font-size:28px;
color:white;
}

/* POPUP */

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#1e1e1e;
padding:25px;
border-radius:20px;
display:none;
z-index:5000;
width:90%;
max-width:350px;
}

.popup h2{
margin-bottom:15px;
}

.popup button{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:10px;
background:#ff0055;
color:white;
width:100%;
}

/* CHAT */

#messages{
height:250px;
overflow:auto;
margin-bottom:10px;
background:#111;
padding:10px;
border-radius:10px;
}

.me{
background:#ff0055;
padding:10px;
margin:8px 0;
border-radius:12px;
text-align:right;
}

.them{
background:#333;
padding:10px;
margin:8px 0;
border-radius:12px;
}

/* TOAST */

#toast{
position:fixed;
bottom:120px;
left:50%;
transform:translateX(-50%);
background:#000;
padding:14px 25px;
border-radius:30px;
opacity:0;
transition:0.3s;
z-index:9999;
}

/* DARK MODE */

.dark{
background:#000;
}

.dark .card{
background:#111;
}

.dark .topbar{
background:#000;
}

.dark .bottomNav{
background:#000;
}

/* MOBILE */

@media(max-width:600px){

.card img{
height:380px;
}

.welcomeBox h1{
font-size:40px;
}

}

</style>
</head>

<body>

<!-- LOADING -->

<div id="loading">

<div class="loader"></div>

<h1>❤️ Ethio Love</h1>

<p>Connecting people...</p>

</div>

<!-- WELCOME -->

<section id="welcome">

<div class="welcomeBox">

<h1>Find Real Love ❤️</h1>

<p>Meet beautiful people near you</p>

<button onclick="openAuth()">Get Started</button>

</div>

</section>

<!-- LOGIN / SIGNUP -->

<section id="auth">

<div class="authBox">

<h2>Create Account</h2>

<input type="text" id="nameInput" placeholder="Your name">

<input type="number" id="ageInput" placeholder="Your age">

<input type="tel" id="phoneInput" placeholder="Phone number">

<input type="email" id="emailInput" placeholder="Gmail">

<input type="password" id="passInput" placeholder="Password">

<button onclick="signup()">Sign Up</button>

</div>

</section>

<!-- APP -->

<section id="app">

<div class="topbar">

<div class="logo">EthioLove</div>

<div class="menuBtn" onclick="openMenu()">☰</div>

</div>

<!-- MENU -->

<div id="menu">

<h2>Menu</h2>

<button onclick="darkMode()">🌙 Dark Mode</button>

<button onclick="changeLanguage()">🌍 Language</button>

<button onclick="premium()">💎 Premium</button>

<button onclick="closeMenu()">❌ Close</button>

</div>

<!-- STORIES -->

<div id="stories">

<div class="story">
<img src="https://i.pravatar.cc/150?img=11">
<p>Sara</p>
</div>

<div class="story">
<img src="https://i.pravatar.cc/150?img=12">
<p>Liya</p>
</div>

<div class="story">
<img src="https://i.pravatar.cc/150?img=13">
<p>Betty</p>
</div>

<div class="story">
<img src="https://i.pravatar.cc/150?img=14">
<p>Abel</p>
</div>

</div>

<!-- CARD -->

<div class="card" id="card">

<img id="userPhoto" src="https://i.pravatar.cc/500?img=20">

<div class="cardContent">

<h2 id="userName">Mimi, 23</h2>

<p id="userBio">Love music and travel ✈️</p>

<p>📍 2km away</p>

<p>❤️ 95% Match</p>

<p>🟢 Online now</p>

<button class="moreBtn" onclick="moreInfo()">More Info</button>

</div>

</div>

<!-- ACTIONS -->

<div class="actions">

<button class="dislike" onclick="dislike()">❌</button>

<button class="like" onclick="like()">❤️</button>

<button class="super" onclick="superLike()">⭐</button>

</div>

<!-- NAV -->

<div class="bottomNav">

<button onclick="home()">🏠</button>

<button onclick="openLikes()">❤️</button>

<button onclick="openChat()">💬</button>

<button onclick="profile()">👤</button>

</div>

</section>

<!-- PROFILE -->

<div class="popup" id="profilePopup">

<h2>My Profile</h2>

<p id="profileName">User</p>

<input type="file" id="upload">

<button onclick="closeProfile()">Close</button>

</div>

<!-- CHAT -->

<div class="popup" id="chatPopup">

<h2>Chat 💬</h2>

<div id="messages">

<div class="them">
Hello 👋
</div>

</div>

<input type="text" id="msgInput" placeholder="Type message..." style="width:100%;padding:12px;border:none;border-radius:10px;background:#333;color:white;">

<button onclick="sendMessage()">Send</button>

<button onclick="voice()">🎤 Voice</button>

<button onclick="video()">📹 Video</button>

<button onclick="closeChat()">Close</button>

</div>

<!-- LIKES -->

<div class="popup" id="likesPopup">

<h2>Liked People ❤️</h2>

<p id="likedText">No likes yet</p>

<button onclick="closeLikes()">Close</button>

</div>

<!-- TOAST -->

<div id="toast"></div>

<!-- AUDIO -->

<audio id="soundLike">
<source src="https://www.soundjay.com/buttons/sounds/button-3.mp3">
</audio>

<script>

/* LOADING */

setTimeout(()=>{

document.getElementById("loading").style.display="none";

},2000);

/* USERS */

let users = [

{
name:"Mimi",
age:23,
bio:"Love music and travel ✈️",
img:"https://i.pravatar.cc/500?img=20"
},

{
name:"Sara",
age:21,
bio:"Coffee and movies ☕",
img:"https://i.pravatar.cc/500?img=32"
},

{
name:"Abel",
age:25,
bio:"Gym and football 💪",
img:"https://i.pravatar.cc/500?img=15"
},

{
name:"Liya",
age:22,
bio:"Fashion designer 👗",
img:"https://i.pravatar.cc/500?img=47"
}

];

let i = 0;

let liked = JSON.parse(localStorage.getItem("liked")) || [];

/* AUTH */

function openAuth(){

document.getElementById("welcome").style.display="none";

document.getElementById("auth").style.display="block";

}

function signup(){

let name = document.getElementById("nameInput").value;

if(name==""){

toast("Enter your name");

return;

}

localStorage.setItem("userName",name);

document.getElementById("profileName").innerText=name;

document.getElementById("auth").style.display="none";

document.getElementById("app").style.display="block";

toast("Welcome " + name + " ❤️");

}

/* SHOW USER */

function showUser(){

document.getElementById("userPhoto").src=users[i].img;

document.getElementById("userName").innerText=users[i].name + ", " + users[i].age;

document.getElementById("userBio").innerText=users[i].bio;

}

showUser();

/* NEXT */

function next(){

i++;

if(i>=users.length){

i=0;

}

showUser();

}

/* LIKE */

function like(){

liked.push(users[i].name);

localStorage.setItem("liked",JSON.stringify(liked));

document.getElementById("soundLike").play();

toast("Liked " + users[i].name + " ❤️");

next();

}

/* DISLIKE */

function dislike(){

toast("Disliked ❌");

next();

}

/* SUPER LIKE */

function superLike(){

toast("Super Like ⭐");

next();

}

/* TOAST */

function toast(text){

let t=document.getElementById("toast");

t.innerText=text;

t.style.opacity="1";

setTimeout(()=>{

t.style.opacity="0";

},2000);

}

/* MENU */

function openMenu(){

document.getElementById("menu").style.right="0";

}

function closeMenu(){

document.getElementById("menu").style.right="-300px";

}

/* DARK MODE */

function darkMode(){

document.body.classList.toggle("dark");

}

/* LANGUAGE */

function changeLanguage(){

toast("Language changed 🌍");

}

/* PREMIUM */

function premium(){

toast("Premium Activated 💎");

}

/* MORE INFO */

function moreInfo(){

alert(
"Name: " + users[i].name +
"\nAge: " + users[i].age +
"\nBio: " + users[i].bio +
"\nHobby: Music, Travel, Fun"
);

}

/* PROFILE */

function profile(){

document.getElementById("profilePopup").style.display="block";

}

function closeProfile(){

document.getElementById("profilePopup").style.display="none";

}

/* CHAT */

function openChat(){

document.getElementById("chatPopup").style.display="block";

}

function closeChat(){

document.getElementById("chatPopup").style.display="none";

}

function sendMessage(){

let input=document.getElementById("msgInput");

if(input.value=="") return;

let messages=document.getElementById("messages");

messages.innerHTML += "<div class='me'>" + input.value + "</div>";

let text=input.value;

localStorage.setItem("lastMessage",text);

input.value="";

setTimeout(()=>{

messages.innerHTML += "<div class='them'>😍 Nice message</div>";

},1000);

toast("Message Sent 💬");

}

/* VOICE */

function voice(){

toast("Voice Sent 🎤");

}

/* VIDEO */

function video(){

toast("Video Call Started 📹");

}

/* LIKES */

function openLikes(){

document.getElementById("likesPopup").style.display="block";

document.getElementById("likedText").innerText=liked.join(", ");

}

function closeLikes(){

document.getElementById("likesPopup").style.display="none";

}

/* STORY */

document.querySelectorAll(".story").forEach(story=>{

story.addEventListener("click",()=>{

toast("Story Opened 📸");

});

});

/* DOUBLE TAP */

let lastTap=0;

document.getElementById("userPhoto").addEventListener("click",()=>{

let now=new Date().getTime();

if(now-lastTap<300){

like();

}

lastTap=now;

});

/* SWIPE */

let startX=0;

let card=document.getElementById("card");

card.addEventListener("touchstart",(e)=>{

startX=e.touches[0].clientX;

});

card.addEventListener("touchend",(e)=>{

let endX=e.changedTouches[0].clientX;

if(endX-startX>50){

like();

}

if(startX-endX>50){

dislike();

}

});

/* UPLOAD PHOTO */

document.getElementById("upload").addEventListener("change",function(e){

let file=e.target.files[0];

let reader=new FileReader();

reader.onload=function(){

document.getElementById("userPhoto").src=reader.result;

};

reader.readAsDataURL(file);

});

/* NOTIFICATIONS */

setInterval(()=>{

let messages=[

"New Like ❤️",

"New Match 🔥",

"New Message 💬",

"Friend Request 👤"

];

let random=messages[Math.floor(Math.random()*messages.length)];

toast(random);

},12000);

</script>

</body>
</html>
