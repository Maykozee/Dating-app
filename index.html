<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Short Video App</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  background:#000;
  overflow:hidden;
}

/* Main container */
.app{
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

/* Video card */
.video{
  height:100vh;
  position:relative;
  scroll-snap-align:start;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#111;
}

/* Video placeholder */
video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* Overlay UI */
.overlay{
  position:absolute;
  bottom:80px;
  left:20px;
  color:#fff;
}

.username{
  font-weight:bold;
  margin-bottom:10px;
}

.caption{
  font-size:14px;
  opacity:0.8;
}

/* Right actions */
.actions{
  position:absolute;
  right:15px;
  bottom:120px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

.btn{
  width:45px;
  height:45px;
  border-radius:50%;
  background:rgba(255,255,255,0.15);
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  color:#fff;
  user-select:none;
  transition:0.2s;
}

.btn:hover{
  background:rgba(255,255,255,0.3);
}

/* Follow button */
.follow{
  background:#ff0050;
}

/* Top bar */
.topbar{
  position:fixed;
  top:10px;
  width:100%;
  text-align:center;
  color:#fff;
  font-weight:bold;
  z-index:10;
}
</style>
</head>

<body>

<div class="topbar">🔥 Short Video App</div>

<div class="app">

  <!-- Video 1 -->
  <div class="video">
    <video autoplay muted loop>
      <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
    </video>

    <div class="overlay">
      <div class="username">@user1</div>
      <div class="caption">Amazing video 🔥</div>
    </div>

    <div class="actions">
      <div class="btn">❤</div>
      <div class="btn">💬</div>
      <div class="btn follow">+</div>
    </div>
  </div>

  <!-- Video 2 -->
  <div class="video">
    <video autoplay muted loop>
      <source src="https://www.w3schools.com/html/movie.mp4" type="video/mp4">
    </video>

    <div class="overlay">
      <div class="username">@user2</div>
      <div class="caption">Cool moment 😎</div>
    </div>

    <div class="actions">
      <div class="btn">❤</div>
      <div class="btn">💬</div>
      <div class="btn follow">+</div>
    </div>
  </div>

</div>

<script>
// defensive coding
document.querySelectorAll(".btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    try{
      if(btn.innerText==="❤"){
        btn.style.background="red";
      }
      if(btn.innerText==="+"){
        btn.innerText="✔";
        btn.style.background="green";
      }
    }catch(err){
      console.log("error:",err);
    }
  });
});
</script>

</body>
</html>
