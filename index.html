<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doro Wet</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
transition:0.3s;
}

body{
background:#050505;
overflow:hidden;
height:100vh;
color:white;
}

/* ================= THEMES ================= */

body.light{
background:#f3f3f3;
color:black;
}

body.light .card{
background:rgba(255,255,255,0.8);
color:black;
}

body.light .subtitle,
body.light .mini{
color:#444;
}

body.light .top-btn{
background:white;
color:black;
}

/* ================= MAIN ================= */

.main{
position:relative;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* backgrounds */

.bg1{
position:absolute;
width:350px;
height:350px;
background:#ff0050;
filter:blur(140px);
border-radius:50%;
top:-120px;
left:-120px;
opacity:0.45;
animation:move1 7s infinite alternate;
}

.bg2{
position:absolute;
width:350px;
height:350px;
background:#00f2ea;
filter:blur(140px);
border-radius:50%;
bottom:-120px;
right:-120px;
opacity:0.45;
animation:move2 8s infinite alternate;
}

@keyframes move1{
100%{
transform:translate(70px,40px);
}
}

@keyframes move2{
100%{
transform:translate(-60px,-50px);
}
}

/* floating */

.float{
position:absolute;
font-size:14px;
opacity:0.14;
animation:floatUp 10s linear infinite;
}

@keyframes floatUp{
0%{
transform:translateY(120vh);
opacity:0;
}
10%{
opacity:0.14;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}

/* counter */

.counter{
position:absolute;
font-size:80px;
font-weight:bold;
opacity:0.06;
animation:pulse 2s infinite;
}

@keyframes pulse{
50%{
transform:scale(1.08);
}
}

/* top buttons */

.top-area{
position:absolute;
top:18px;
right:18px;
display:flex;
gap:10px;
z-index:100;
}

.top-btn{
padding:11px 16px;
border:none;
border-radius:14px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
color:white;
font-size:14px;
cursor:pointer;
border:1px solid rgba(255,255,255,0.08);
}

/* dropdown */

.dropdown{
position:absolute;
top:60px;
right:0;
width:170px;
background:rgba(20,20,20,0.95);
border-radius:18px;
padding:10px;
display:none;
backdrop-filter:blur(20px);
}

.drop-item{
padding:14px;
border-radius:12px;
font-size:14px;
cursor:pointer;
}

.drop-item:hover{
background:rgba(255,255,255,0.08);
}

/* card */

.card{
position:relative;
width:90%;
max-width:390px;
padding:42px 28px;
background:rgba(255,255,255,0.07);
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(24px);
border-radius:32px;
text-align:center;
z-index:5;
box-shadow:0 0 40px rgba(0,0,0,0.4);
animation:show 1.1s ease;
}

@keyframes show{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.logo{
font-size:48px;
font-weight:bold;
margin-bottom:14px;
background:linear-gradient(90deg,#ff0050,#00f2ea);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.title{
font-size:31px;
font-weight:bold;
line-height:1.4;
margin-bottom:14px;
}

.subtitle{
font-size:15px;
line-height:1.8;
color:#d5d5d5;
margin-bottom:34px;
}

/* button */

.btn{
position:relative;
width:100%;
padding:17px;
border:none;
border-radius:18px;
background:linear-gradient(90deg,#ff0050,#00f2ea);
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
overflow:hidden;
box-shadow:0 0 25px rgba(255,0,80,0.45);
}

.btn::before{
content:"";
position:absolute;
top:0;
left:-120%;
width:60%;
height:100%;
background:rgba(255,255,255,0.3);
transform:skewX(-20deg);
animation:shine 2.4s infinite;
}

@keyframes shine{
100%{
left:170%;
}
}

.mini{
margin-top:18px;
font-size:12px;
color:#aaaaaa;
line-height:1.7;
}

</style>
</head>
<body>

<div class="main">

<div class="bg1"></div>
<div class="bg2"></div>

<div class="counter" id="counter">
0
</div>

<div class="float" style="left:10%">+25 Followers</div>
<div class="float" style="left:75%;animation-delay:2s">Trending</div>
<div class="float" style="left:50%;animation-delay:4s">Viral Video</div>

<!-- top buttons -->

<div class="top-area">

<button class="top-btn" onclick="toggleLang()">
Language
</button>

<button class="top-btn" onclick="toggleDark()">
Dark
</button>

<div class="dropdown" id="langMenu">

<div class="drop-item" onclick="changeLang('en')">
English
</div>

<div class="drop-item" onclick="changeLang('am')">
አማርኛ
</div>

</div>

</div>

<!-- card -->

<div class="card">

<div class="logo">
Doro Wet
</div>

<div class="title" id="title">
Turn Your TikTok Into A Viral Brand
</div>

<div class="subtitle" id="subtitle">
Grow faster, discover creators, increase engagement, and build your audience with modern creator tools.
</div>

<button class="btn" onclick="goSignup()">
Get Started
</button>

<div class="mini">
Modern Creator Community Platform
</div>

</div>

</div>

<script>

/* counter */

let count = 0;

let counter = document.getElementById("counter");

let inter = setInterval(()=>{

count += 7;

counter.innerHTML = count + "+";

if(count >= 1000){

clearInterval(inter);

counter.innerHTML = "1000+";

}

},25);

/* signup */

function goSignup(){

alert("Signup Page Coming Next");

}

/* language */

let menu = document.getElementById("langMenu");

function toggleLang(){

if(menu.style.display === "block"){

menu.style.display = "none";

}else{

menu.style.display = "block";

}

}

/* language data */

function changeLang(lang){

let title = document.getElementById("title");

let subtitle = document.getElementById("subtitle");

if(lang === "am"){

title.innerHTML = "ቲክቶክህን ወደ ቫይራል ብራንድ ቀይር";

subtitle.innerHTML = "ፈጣን እድገት፣ ክሬይተሮችን ማግኘት፣ ኢንጌጅመንት መጨመር እና ታዳሚዎችህን ማሳደግ።";

}

if(lang === "en"){

title.innerHTML = "Turn Your TikTok Into A Viral Brand";

subtitle.innerHTML = "Grow faster, discover creators, increase engagement, and build your audience with modern creator tools.";

}

menu.style.display = "none";

}

/* dark mode */

let dark = true;

function toggleDark(){

dark = !dark;

if(dark){

document.body.classList.remove("light");

document.querySelectorAll(".top-btn")[1].innerHTML = "Dark";

}else{

document.body.classList.add("light");

document.querySelectorAll(".top-btn")[1].innerHTML = "Light";

}

}

</script>

</body>
</html>
