<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ethio Love</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ff416c,#ff4b2b);
height:100vh;
overflow:hidden;
color:white;
}

/* LOADING */

#loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

.loader{
width:80px;
height:80px;
border-radius:50%;
border:8px solid #333;
border-top:8px solid #ff416c;
animation:spin 1s linear infinite;
margin-bottom:20px;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

/* LOGIN */

#loginPage{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

.loginBox{
width:90%;
max-width:350px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:25px;
border-radius:25px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.loginBox h1{
margin-bottom:20px;
}

.loginBox input{
width:100%;
padding:15px;
margin-top:12px;
border:none;
border-radius:12px;
font-size:16px;
outline:none;
}

.loginBox button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:12px;
background:#ff416c;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

/* APP */

#app{
display:none;
height:100vh;
padding-bottom:80px;
overflow:auto;
}

/* TOP BAR */

#topBar{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px;
font-size:22px;
font-weight:bold;
}

/* STORIES */

#stories{
display:flex;
gap:12px;
overflow-x:auto;
padding:0 15px 15px;
}

.story{
text-align:center;
}

.story img{
width:70px;
height:70px;
border-radius:50%;
border:3px solid white;
object-fit:cover;
}

/* CARD */

.card{
width:90%;
max-width:380px;
margin:auto;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
border-radius:30px;
overflow:hidden;
position:relative;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
animation:fade 0.4s;
}

@keyframes fade{
from{
opacity:0;
transform:scale(0.9);
}
to{
opacity:1;
transform:scale(1);
}
}

.card img{
width:100%;
height:420px;
object-fit:cover;
}

.info{
padding:20px;
}

.info h2{
font-size:30px;
margin-bottom:8px;
}

.badge{
background:#00bfff;
padding:5px 10px;
border-radius:20px;
font-size:14px;
margin-left:8px;
}

.bio{
margin-top:10px;
opacity:0.9;
}

.distance{
margin-top:10px;
font-size:14px;
}

/* BUTTONS */

.actions{
display:flex;
justify-content:center;
gap:15px;
padding:20px;
}

.actions button{
width:70px;
height:70px;
border:none;
border-radius:50%;
font-size:28px;
cursor:pointer;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

.dislike{
background:white;
color:black;
}

.like{
background:#ff416c;
color:white;
}

.super{
background:#00bfff;
color:white;
}

/* MATCH */

#matchPopup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
background:white;
color:#ff416c;
padding:30px;
border-radius:30px;
font-size:35px;
font-weight:bold;
z-index:999;
transition:0.4s;
}

/* NAVBAR */

#navbar{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
justify-content:space-around;
align-items:center;
padding:15px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
}

#navbar button{
background:none;
border:none;
font-size:28px;
color:white;
}

/* CHAT */

#chatBox{
position:fixed;
bottom:-100%;
left:0;
width:100%;
height:70%;
background:white;
color:black;
border-radius:30px 30px 0 0;
transition:0.4s;
padding:20px;
z-index:999;
}

#messages{
height:75%;
overflow:auto;
margin-bottom:10px;
}

.me{
background:#ff416c;
color:white;
padding:12px;
border-radius:15px;
margin:8px 0;
text-align:right;
}

.them{
background:#eee;
padding:12px;
border-radius:15px;
margin:8px 0;
}

#chatInput{
width:100%;
padding:15px;
border:none;
background:#f2f2f2;
border-radius:15px;
font-size:16px;
}

/* PROFILE */

#profilePage{
position:fixed;
top:0;
right:-100%;
width:100%;
height:100%;
background:#111;
transition:0.4s;
z-index:999;
padding:25px;
overflow:auto;
}

#profilePage img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
margin-top:20px;
border:4px solid #ff416c;
}

/* NOTIFICATION */

#toast{
position:fixed;
bottom:100px;
left:50%;
transform:translateX(-50%);
background:black;
padding:14px 22px;
border-radius:15px;
opacity:0;
transition:0.3s;
z-index:9999;
}

/* DARK */

.dark{
background:#111;
}

.dark .card{
background:#1b1b1b;
}

.dark #navbar{
background:#1b1b1b;
}

</style>
</head>

<body>

<!-- LOADING -->

<div id="loading">

<div class="loader"></div>

<h1>❤️ Ethio Love</h1>

<p>Connecting people...</p>

</div>

<!-- LOGIN -->

<div id="loginPage">

<div class="loginBox">

<h1>Ethio Love ❤️</h1>

<input type="text" id="nameInput" placeholder="Your name">

<input type="email" placeholder="Gmail">

<input type="password" placeholder="Password">

<button onclick="login()">Sign In</button>

<button onclick="signup()">Create Account</button>

</div>

</div>

<!-- APP -->

<div id="app">

<div id="topBar">

<div>🔥 Discover</div>

<div id="onlineCount">120 Online</div>

</div>

<!-- STORIES -->

<div id="stories">

<div class="story">
<img src="https://i.pravatar.cc/100?img=12">
<p>Liya</p>
</div>

<div class="story">
<img src="https://i.pravatar.cc/100?img=14">
<p>Sara</p>
</div>

<div class="story">
<img src="https://i.pravatar.cc/100?img=15">
<p>Abel</p>
</div>

<div class="story">
<img src="https://i.pravatar.cc/100?img=18">
<p>Miki</p>
</div>

</div>

<!-- CARD -->

<div class="card" id="card">

<img id="photo" src="">

<div class="info">

<h2 id="personName"></h2>

<p class="bio" id="bio"></p>

<p class="distance" id="distance"></p>

</div>

<div class="actions">

<button class="dislike" onclick="dislike()">❌</button>

<button class="like" onclick="like()">❤️</button>

<button class="super" onclick="superLike()">⭐</button>

</div>

</div>

</div>

<!-- NAVBAR -->

<div id="navbar">

<button onclick="home()">🏠</button>

<button onclick="openChat()">💬</button>

<button onclick="openProfile()">👤</button>

<button onclick="darkMode()">🌙</button>

</div>

<!-- CHAT -->

<div id="chatBox">

<h2>💬 Chat</h2>

<div id="messages">

<div class="them">
Hello 👋
</div>

</div>

<input type="text" id="chatInput" placeholder="Type message">

<br><br>

<button onclick="sendMessage()" style="
width:100%;
padding:15px;
border:none;
background:#ff416c;
color:white;
border-radius:15px;
font-size:18px;
">
Send
</button>

<br><br>

<button onclick="closeChat()" style="
width:100%;
padding:15px;
border:none;
background:black;
color:white;
border-radius:15px;
font-size:18px;
">
Close
</button>

</div>

<!-- PROFILE -->

<div id="profilePage">

<h1>👤 My Profile</h1>

<center>

<img id="myPhoto" src="https://i.pravatar.cc/150?img=11">

<h2 id="myName">User</h2>

<p>I love coding ❤️</p>

<br>

<input type="file" id="uploadPhoto">

<br><br>

<button onclick="closeProfile()" style="
padding:15px 25px;
border:none;
background:#ff416c;
color:white;
border-radius:15px;
font-size:18px;
">
Close
</button>

</center>

</div>

<!-- MATCH -->

<div id="matchPopup">
❤️ MATCH ❤️
</div>

<!-- TOAST -->

<div id="toast"></div>

<script>

/* USERS */

let users = [

{
name:"Sara",
age:22,
bio:"Love music 🎵",
img:"https://i.pravatar.cc/400?img=1"
},

{
name:"Liya",
age:24,
bio:"Travel addict ✈️",
img:"https://i.pravatar.cc/400?img=5"
},

{
name:"Betty",
age:21,
bio:"Coffee lover ☕",
img:"https://i.pravatar.cc/400?img=6"
},

{
name:"Miki",
age:25,
bio:"Gym & fitness 💪",
img:"https://i.pravatar.cc/400?img=8"
},

{
name:"Abel",
age:26,
bio:"Football fan ⚽",
img:"https://i.pravatar.cc/400?img=12"
}

];

let current = 0;

/* LOADING */

setTimeout(()=>{

document.getElementById("loading").style.display="none";

},2500);

/* SHOW USER */

function showUser(){

document.getElementById("photo").src=users[current].img;

document.getElementById("personName").innerHTML=
users[current].name + ", " + users[current].age +
'<span class="badge">Verified</span>';

document.getElementById("bio").innerText=
users[current].bio;

let km=Math.floor(Math.random()*10)+1;

document.getElementById("distance").innerText=
"📍 " + km + " km away";

}

showUser();

/* LOGIN */

function login(){

let name=document.getElementById("nameInput").value;

if(name==""){

toast("Enter your name");

return;

}

document.getElementById("loginPage").style.display="none";

document.getElementById("app").style.display="block";

document.getElementById("myName").innerText=name;

toast("Welcome " + name + " ❤️");

}

/* SIGNUP */

function signup(){

toast("Account created ❤️");

}

/* NEXT */

function nextUser(){

current++;

if(current>=users.length){

current=0;

}

showUser();

}

/* LIKE */

function like(){

document.getElementById("card").style.transform=
"translateX(500px) rotate(20deg)";

showMatch();

setTimeout(()=>{

document.getElementById("card").style.transform=
"translateX(0)";

nextUser();

},300);

}

/* DISLIKE */

function dislike(){

document.getElementById("card").style.transform=
"translateX(-500px) rotate(-20deg)";

setTimeout(()=>{

document.getElementById("card").style.transform=
"translateX(0)";

nextUser();

},300);

}

/* SUPER LIKE */

function superLike(){

toast("Super Like ⭐");

nextUser();

}

/* MATCH */

function showMatch(){

let match=document.getElementById("matchPopup");

match.style.transform=
"translate(-50%,-50%) scale(1)";

setTimeout(()=>{

match.style.transform=
"translate(-50%,-50%) scale(0)";

},1200);

}

/* TOAST */

function toast(text){

let toast=document.getElementById("toast");

toast.innerText=text;

toast.style.opacity="1";

setTimeout(()=>{

toast.style.opacity="0";

},2000);

}

/* CHAT */

function openChat(){

document.getElementById("chatBox").style.bottom="0";

}

function closeChat(){

document.getElementById("chatBox").style.bottom="-100%";

}

function sendMessage(){

let input=document.getElementById("chatInput");

if(input.value=="") return;

let messages=document.getElementById("messages");

messages.innerHTML +=
'<div class="me">'+input.value+'</div>';

let msg=input.value;

input.value="";

setTimeout(()=>{

let replies=[
"😍 Nice",
"❤️ Wow",
"🔥 Amazing",
"😊 Tell me more",
"💘 I like your vibe"
];

let random=
replies[Math.floor(Math.random()*replies.length)];

messages.innerHTML +=
'<div class="them">'+random+'</div>';

messages.scrollTop=messages.scrollHeight;

},1000);

}

/* PROFILE */

function openProfile(){

document.getElementById("profilePage").style.right="0";

}

function closeProfile(){

document.getElementById("profilePage").style.right="-100%";

}

/* DARK MODE */

function darkMode(){

document.body.classList.toggle("dark");

}

/* PHOTO UPLOAD */

document.getElementById("uploadPhoto")
.addEventListener("change",function(e){

let file=e.target.files[0];

if(file){

let reader=new FileReader();

reader.onload=function(){

document.getElementById("myPhoto").src=
reader.result;

};

reader.readAsDataURL(file);

}

});

/* ONLINE USERS */

setInterval(()=>{

let random=Math.floor(Math.random()*500)+100;

document.getElementById("onlineCount")
.innerText=random + " Online";

},3000);

/* ENTER SEND */

document.getElementById("chatInput")
.addEventListener("keypress",function(e){

if(e.key==="Enter"){

sendMessage();

}

});

</script>

</body>
</html>
