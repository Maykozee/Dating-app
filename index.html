<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doro Wet</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
transition:0.3s;
}

/* ================= LOADER ================= */

.loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
background:#050505;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:99999;
animation:hideLoader 0.7s ease forwards;
animation-delay:2s;
}

@keyframes hideLoader{

to{
opacity:0;
visibility:hidden;
}

}

.loader-logo{

font-size:88px;
font-weight:900;
font-style:italic;
letter-spacing:-4px;

background:linear-gradient(
90deg,
#ff00a8,
#8b5cf6,
#00f2ea
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 0 20px rgba(255,0,168,0.4),
0 0 40px rgba(0,242,234,0.2);

animation:loaderGlow 1.4s infinite alternate;
}

@keyframes loaderGlow{

100%{
transform:scale(1.06);
filter:brightness(1.2);
}

}

.loader-text{

margin-top:16px;
font-size:15px;
letter-spacing:2px;
color:#bdbdbd;
}

.loader-bar{

width:220px;
height:8px;
background:rgba(255,255,255,0.08);
border-radius:20px;
overflow:hidden;
margin-top:30px;
}

.loader-fill{

width:0%;
height:100%;
border-radius:20px;

background:linear-gradient(
90deg,
#ff0050,
#8b5cf6,
#00f2ea
);

animation:loading 2s linear forwards;
}

@keyframes loading{

100%{
width:100%;
}

}

/* ================= THEMES ================= */

body.light{
background:#f3f3f3;
color:black;
}

body.light .card{
background:rgba(255,255,255,0.8);
color:black;
}

body.light .subtitle,
body.light .mini{
color:#222;
}

body.light .title{
color:#000;
}

body.light .top-btn{

background:white;

color:#111;

border:1px solid rgba(0,0,0,0.08);

box-shadow:
0 5px 18px rgba(0,0,0,0.08);

}
  
body{
background:
radial-gradient(circle at top left,#320014 0%,#050505 45%),
radial-gradient(circle at bottom right,#001f24 0%,#050505 40%),
#050505;

overflow:hidden;
height:100vh;
color:white;
}
  
/* ================= MAIN ================= */

.main{
position:relative;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* backgrounds */

.bg1{
position:absolute;
width:350px;
height:350px;
background:#ff0050;
filter:blur(140px);
border-radius:50%;
top:-120px;
left:-120px;
opacity:0.45;
animation:move1 7s infinite alternate;
}

.bg2{
position:absolute;
width:350px;
height:350px;
background:#00f2ea;
filter:blur(140px);
border-radius:50%;
bottom:-120px;
right:-120px;
opacity:0.45;
animation:move2 8s infinite alternate;
}

@keyframes move1{
100%{
transform:translate(70px,40px);
}
}

@keyframes move2{
100%{
transform:translate(-60px,-50px);
}
}

/* floating */

.float{
position:absolute;
font-size:14px;
opacity:0.14;
animation:floatUp 10s linear infinite;
}

@keyframes floatUp{
0%{
transform:translateY(120vh);
opacity:0;
}
10%{
opacity:0.14;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}

/* counter */

.counter{
position:absolute;
font-size:80px;
font-weight:bold;
opacity:0.06;
animation:pulse 2s infinite;
}

@keyframes pulse{
50%{
transform:scale(1.08);
}
}

/* top buttons */

.top-area{
position:absolute;
top:18px;
right:18px;
display:flex;
gap:10px;
z-index:100;
}

.top-btn{

padding:13px 18px;

border:none;

border-radius:16px;

background:rgba(255,255,255,0.12);

backdrop-filter:blur(18px);

color:white;

font-size:14px;

font-weight:700;

cursor:pointer;

border:1px solid rgba(255,255,255,0.14);

box-shadow:
0 5px 20px rgba(0,0,0,0.25);

}

/* dropdown */

.dropdown{
position:absolute;
top:60px;
right:0;
width:170px;
background:rgba(20,20,20,0.95);
border-radius:18px;
padding:10px;
display:none;
backdrop-filter:blur(20px);
}

.drop-item{
padding:14px;
border-radius:12px;
font-size:14px;
cursor:pointer;
}

.drop-item:hover{
background:rgba(255,255,255,0.08);
}

/* card */

.card{
position:relative;
width:90%;
max-width:410px;
padding:55px 30px;

background:rgba(15,15,25,0.55);

border:1px solid rgba(255,255,255,0.08);

backdrop-filter:blur(30px);

border-radius:36px;

text-align:center;

z-index:5;

box-shadow:
0 0 50px rgba(0,0,0,0.5),
0 0 25px rgba(255,0,120,0.08);

animation:show 1.1s ease;

overflow:hidden;
}

@keyframes show{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.logo{
font-size:72px;
font-weight:900;
letter-spacing:-4px;
margin-bottom:20px;
font-style:italic;
text-transform:uppercase;

background:linear-gradient(
90deg,
#ff00a8,
#ff4fd8,
#8b5cf6,
#00f2ea
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 0 10px rgba(255,0,168,0.4),
0 0 20px rgba(0,242,234,0.3),
0 0 40px rgba(255,0,168,0.2);

animation:logoGlow 3s infinite alternate;
}

@keyframes logoGlow{

100%{
transform:scale(1.03);
filter:brightness(1.15);
}

}

.subtitle{
font-size:18px;
line-height:1.8;
color:#cfcfcf;
margin-bottom:38px;
opacity:0.9;
}

.subtitle{
font-size:15px;
line-height:1.8;
color:#d5d5d5;
margin-bottom:34px;
}

/* button */

.btn{
position:relative;
width:100%;
padding:17px;
border:none;
border-radius:18px;
background:linear-gradient(90deg,#ff0050,#00f2ea);
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
overflow:hidden;
box-shadow:0 0 25px rgba(255,0,80,0.45);
}

.btn::before{
content:"";
position:absolute;
top:0;
left:-120%;
width:60%;
height:100%;
background:rgba(255,255,255,0.3);
transform:skewX(-20deg);
animation:shine 2.4s infinite;
}

@keyframes shine{
100%{
left:170%;
}
}

.mini{
margin-top:18px;
font-size:12px;
color:#aaaaaa;
line-height:1.7;
}

</style>
</head>
<body>

<div class="loader" id="loader">

<div class="loader-logo">
ETORIKA
</div>

<div class="loader-text">
Preparing Your Creator Space...
</div>

<div class="loader-bar">

<div class="loader-fill"></div>

</div>

</div>

<div class="main">

<div class="bg1"></div>
<div class="bg2"></div>

<div class="counter" id="counter">
0
</div>

<div class="float" style="left:10%">+25 Followers</div>
<div class="float" style="left:75%;animation-delay:2s">Trending</div>
<div class="float" style="left:50%;animation-delay:4s">Viral Video</div>

<!-- top buttons -->

<div class="top-area">

<button class="top-btn" id="langBtn" onclick="toggleLang()">
Language
</button>
  
<button class="top-btn" id="themeBtn" onclick="toggleDark()">
Dark
</button>
<div class="dropdown" id="langMenu">

<div class="drop-item" onclick="changeLang('en')">
English
</div>

<div class="drop-item" onclick="changeLang('am')">
አማርኛ
</div>

</div>

</div>

<!-- card -->

<div class="card">

<div class="logo">
EYORIKA
</div>

<div class="title" id="title">
Go Viral Faster On TikTok
</div>
  
<div class="subtitle" id="subtitle">
Boost followers, increase views, and grow your TikTok audience with smart creator tools.
</div>

<button class="btn" onclick="goSignup()">
Get Started
</button>

<div class="mini">
Modern Creator Community Platform
</div>

</div>

</div>

<script>

/* counter */

let count = 0;

let counter = document.getElementById("counter");

let inter = setInterval(()=>{

count += 7;

counter.innerHTML = count + "+";

if(count >= 1000){

clearInterval(inter);

counter.innerHTML = "1000+";

}

},25);

/* signup */

function goSignup(){

alert("Signup Page Coming Next");

}

/* language */

let menu = document.getElementById("langMenu");

function toggleLang(){

if(menu.style.display === "block"){

menu.style.display = "none";

}else{

menu.style.display = "block";

}

}

/* language data */

function changeLang(lang){

let title = document.getElementById("title");

let subtitle = document.getElementById("subtitle");

if(lang === "am"){

document.getElementById("langBtn").innerHTML = "English";

title.innerHTML = "ቲክቶክህን ፈጣን ቫይራል አድርግ";

subtitle.innerHTML = "ተከታዮችን ጨምር፣ ቪዲዮዎችህን አሳድግ እና በዘመናዊ creator tools ፈጣን እድገት አግኝ።";

if(lang === "en"){

document.getElementById("langBtn").innerHTML = "አማርኛ";

title.innerHTML = "Go Viral Faster On TikTok";

subtitle.innerHTML = "Boost followers, increase views, and grow your TikTok audience with smart creator tools.";
menu.style.display = "none";

}

/* dark mode */

let dark = true;

function toggleDark(){

dark = !dark;

if(dark){

document.body.classList.remove("light");

document.getElementById("themeBtn").innerHTML = "Dark";

}else{

document.body.classList.add("light");

document.getElementById("themeBtn").innerHTML = "Light";
}

}

</script>

</body>
</html>
