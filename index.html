<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>TokBoost</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      background:#0f0f0f;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      color:white;
    }

    .bg{
      position:absolute;
      width:300px;
      height:300px;
      background:#ff0050;
      filter:blur(120px);
      border-radius:50%;
      top:-80px;
      left:-80px;
      opacity:0.5;
      animation:move 6s infinite alternate;
    }

    .bg2{
      position:absolute;
      width:300px;
      height:300px;
      background:#00f2ea;
      filter:blur(120px);
      border-radius:50%;
      bottom:-100px;
      right:-100px;
      opacity:0.5;
      animation:move2 7s infinite alternate;
    }

    @keyframes move{
      0%{
        transform:translate(0,0);
      }
      100%{
        transform:translate(60px,40px);
      }
    }

    @keyframes move2{
      0%{
        transform:translate(0,0);
      }
      100%{
        transform:translate(-50px,-30px);
      }
    }

    .card{
      width:90%;
      max-width:380px;
      padding:40px 30px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.1);
      backdrop-filter:blur(20px);
      border-radius:30px;
      text-align:center;
      z-index:10;
      box-shadow:0 0 40px rgba(0,0,0,0.4);
    }

    .logo{
      font-size:42px;
      font-weight:bold;
      margin-bottom:15px;
      background:linear-gradient(90deg,#ff0050,#00f2ea);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .title{
      font-size:28px;
      font-weight:bold;
      margin-bottom:12px;
    }

    .subtitle{
      font-size:15px;
      color:#cfcfcf;
      line-height:1.6;
      margin-bottom:35px;
    }

    .btn{
      width:100%;
      padding:16px;
      border:none;
      border-radius:18px;
      background:linear-gradient(90deg,#ff0050,#00f2ea);
      color:white;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 0 20px rgba(255,0,80,0.5);
    }

    .btn:hover{
      transform:scale(1.03);
    }

    .mini{
      margin-top:22px;
      font-size:13px;
      color:#aaaaaa;
    }

  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="bg2"></div>

  <div class="card">

    <div class="logo">TokBoost</div>

    <div class="title">
      Grow Faster On TikTok
    </div>

    <div class="subtitle">
      Discover creators, grow your audience, earn coins, and boost your TikTok profile professionally.
    </div>

    <button class="btn">
      Get Started
    </button>

    <div class="mini">
      Creator Growth Community
    </div>

  </div>

</body>
</html>
