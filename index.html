<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EYORIKA</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Outfit',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{

background:
linear-gradient(
180deg,
#050505 0%,
#0e0906 45%,
#1b120d 100%
);

color:white;
overflow:hidden;

}

/* ========= GLOBAL ========= */

.hidden{
display:none !important;
}

.page{
width:100%;
height:100vh;
position:absolute;
top:0;
left:0;
overflow:hidden;
}

/* ========= PREMIUM BACKGROUND ========= */

.main-bg{

position:absolute;
inset:0;

background:
radial-gradient(circle at top left,#6d3d18 0%,transparent 30%),
radial-gradient(circle at bottom right,#2c160b 0%,transparent 30%),
linear-gradient(180deg,#050505,#120904,#1d120c);

z-index:-5;

}

.noise{

position:absolute;
inset:0;

background:url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1200&auto=format&fit=crop');

background-size:cover;
background-position:center;

opacity:.05;

filter:blur(2px);

z-index:-4;

}

/* ========= LOADING ========= */

#loadingPage{

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

}

.light-beam{

position:absolute;

width:220px;
height:1000px;

background:
linear-gradient(
180deg,
transparent,
rgba(255,210,120,.14),
transparent
);

transform:rotate(35deg);

left:-180px;

animation:beamMove 4s linear infinite;

}

.logo-box{

width:130px;
height:130px;

border-radius:38px;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(
145deg,
#fff1d8,
#b5763c,
#2b170c
);

border:1px solid rgba(255,255,255,.12);

box-shadow:
0 0 35px rgba(255,190,100,.18),
0 0 80px rgba(255,170,80,.12);

}

.e-logo{

display:flex;
flex-direction:column;
gap:10px;

}

.e-line{

height:11px;

border-radius:30px;

background:
linear-gradient(
90deg,
#fff8ea,
#f5cb8b,
#8e592f
);

position:relative;
overflow:hidden;

}

.e1{width:78px;}
.e2{width:56px;}
.e3{width:78px;}

.e-line::after{

content:"";

position:absolute;
inset:0;

background:
linear-gradient(
90deg,
transparent,
rgba(255,255,255,.7),
transparent
);

animation:shine 2.6s linear infinite;

}

.loading-title{

margin-top:32px;

font-size:58px;
font-weight:800;
letter-spacing:7px;

background:
linear-gradient(
90deg,
#fff6e6,
#f5cc92,
#8f5b2e
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.loading-sub{

margin-top:12px;

font-size:13px;
letter-spacing:5px;

color:#d8b58f;

text-transform:uppercase;

}

.loader{

width:220px;
height:7px;

margin-top:38px;

border-radius:30px;

overflow:hidden;

background:rgba(255,255,255,.08);

}

.loader-fill{

width:0%;
height:100%;

border-radius:30px;

background:
linear-gradient(
90deg,
#8f5b2e,
#f7d49a,
#fff8ef
);

animation:loading 1.3s linear forwards;

}

.socials{

display:flex;
gap:24px;

margin-top:34px;

}

.socials img{

width:34px;
height:34px;

filter:
drop-shadow(0 0 12px rgba(255,210,120,.25));

transition:.35s;

}

.socials img:hover{

transform:translateY(-4px) scale(1.05);

}

.signature{

position:absolute;

bottom:20px;
left:22px;

font-size:12px;
letter-spacing:3px;

color:#8d7158;

}

/* ========= WELCOME ========= */

#welcomePage{

display:flex;
justify-content:center;
align-items:center;

padding:24px;

}

.welcome-card{

width:100%;
max-width:430px;

padding:42px 28px;

border-radius:36px;

background:
linear-gradient(
180deg,
rgba(255,255,255,.08),
rgba(255,255,255,.03)
);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.08);

box-shadow:
0 0 60px rgba(0,0,0,.55);

text-align:center;

animation:cardShow .7s ease;

}

.hero-logo{

width:95px;
height:95px;

margin:auto;

border-radius:30px;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(
145deg,
#fff1d8,
#b5763c,
#2b170c
);

font-size:44px;
font-weight:800;

box-shadow:
0 0 35px rgba(255,190,100,.18);

}

.brand{

margin-top:22px;

font-size:52px;
font-weight:800;
letter-spacing:6px;

background:
linear-gradient(
90deg,
#fff7ec,
#f7d49a,
#8f5b2e
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.title{

margin-top:24px;

font-size:36px;
font-weight:700;
line-height:1.3;

}

.subtitle{

margin-top:18px;

font-size:16px;
line-height:1.8;

color:#cfcfcf;

}

.main-btn{

width:100%;

margin-top:34px;

padding:18px;

border:none;
border-radius:18px;

font-size:17px;
font-weight:700;

cursor:pointer;

background:
linear-gradient(
135deg,
#7c4a23,
#f6cf93,
#fff6ea
);

color:#050505;

box-shadow:
0 10px 30px rgba(255,200,120,.18);

transition:.3s;

}

.main-btn:hover{

transform:translateY(-3px);

}

.small-text{

margin-top:20px;

font-size:13px;
line-height:1.7;

color:#9e9e9e;

}

/* ========= ANIMATIONS ========= */

@keyframes loading{
100%{
width:100%;
}
}

@keyframes shine{
100%{
transform:translateX(120px);
}
}

@keyframes beamMove{
100%{
transform:rotate(35deg) translateX(550px);
}
}

@keyframes cardShow{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* ========= MOBILE ========= */

@media(max-width:480px){

.loading-title{
font-size:46px;
}

.brand{
font-size:42px;
}

.title{
font-size:30px;
}

}

</style>
</head>

<body>

<!-- ========= BACKGROUND ========= -->

<div class="main-bg"></div>
<div class="noise"></div>

<!-- ========= LOADING ========= -->

<section id="loadingPage" class="page">

<div class="light-beam"></div>

<div class="logo-box">

<div class="e-logo">

<div class="e-line e1"></div>
<div class="e-line e2"></div>
<div class="e-line e3"></div>

</div>

</div>

<div class="loading-title">
EYORIKA
</div>

<div class="loading-sub">
WELCOME TO EYORIKA
</div>

<div class="loader">
<div class="loader-fill"></div>
</div>

<div class="socials">

<img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">

<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">

</div>

<div class="signature">
MAYKOZEE
</div>

</section>

<!-- ========= WELCOME ========= -->

<section id="welcomePage" class="page hidden">

<div class="welcome-card">

<div class="hero-logo">
E
</div>

<div class="brand">
EYORIKA
</div>

<div class="title">
Grow Faster.<br>
Go Viral.
</div>

<div class="subtitle">
Smart tools for TikTok and Instagram creators with premium growth experience.
</div>

<button class="main-btn">
Get Started
</button>

<div class="small-text">
Premium creator platform designed for modern TikTok & Instagram creators.
</div>

</div>

</section>

<script>

setTimeout(()=>{

document.getElementById("loadingPage").classList.add("hidden");

document.getElementById("welcomePage").classList.remove("hidden");

},1300);

</script>

</body>
</html>
